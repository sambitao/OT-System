        // 🌟 ฟังก์ชันแปลงเดือน
        const formatMonth = (YYYYMM) => {
            if (!YYYYMM) return 'ทั้งหมด';
            const [year, month] = YYYYMM.split('-');
            const date = new Date(year, month - 1);
            return date.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
        };

        // 🌟 ฟังก์ชันจัดการเวลาสำหรับการกรองแบบ สัปดาห์/ปี
        const getStartOfWeek = (date) => {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setHours(0,0,0,0)).setDate(diff);
        };
        const getEndOfWeek = (date) => {
            const d = new Date(getStartOfWeek(date));
            return new Date(d.setDate(d.getDate() + 6)).setHours(23,59,59,999);
        };
        const getLocalYYYYMMDD = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };
        const formatWeekLabel = (startDateStr) => {
            if (!startDateStr) return 'ทั้งหมด';
            const start = new Date(startDateStr);
            const end = new Date(getEndOfWeek(start));
            const formatOpt = { day: 'numeric', month: 'short' };
            const formatOptYear = { day: 'numeric', month: 'short', year: 'numeric' };
            return `${start.toLocaleDateString('th-TH', formatOpt)} - ${end.toLocaleDateString('th-TH', formatOptYear)}`;
        };

            try {

                const weeksSet = new Set();
                let curr = new Date(startDate);
                
                while (curr <= endDate) {
                    weeksSet.add(getLocalYYYYMMDD(getStartOfWeek(curr)));
                    curr.setDate(curr.getDate() + 1);

        function App() {
            const [loggedInUser, setLoggedInUser] = useState(() => {
                const saved = localStorage.getItem('ot_user');
                return saved ? JSON.parse(saved) : null;
            });

            const [activeTab, setActiveTab] = useState('dashboard');
            const [records, setRecords] = useState([]);

            const [allRecords, setAllRecords] = useState([]);
            const [showForm, setShowForm] = useState(false);
            const [editingRecord, setEditingRecord] = useState(null);
            
            // 🌟 สถานะจัดการตัวกรองส่วนกลางทั้งหมด
            const [timeFilterType, setTimeFilterType] = useState('month');

                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

            const [selectedUserFilter, setSelectedUserFilter] = useState('');
            const [adminTeamFilter, setAdminTeamFilter] = useState('');
            const [adminJobTypeFilter, setAdminJobTypeFilter] = useState('');
            
            const [recordToDelete, setRecordToDelete] = useState(null); 
            const [showChangePassword, setShowChangePassword] = useState(false); 
            
            const [user, setUser] = useState(null);
            const [dbStatus, setDbStatus] = useState('connecting');

            const handleLogin = (userData) => {
                setLoggedInUser(userData);
                localStorage.setItem('ot_user', JSON.stringify(userData));
            };

            const handleLogout = () => {
                setLoggedInUser(null);
                localStorage.removeItem('ot_user');
                setRecords([]);
                setAllRecords([]);
            };

            useEffect(() => {
                const initAuth = async () => {
                try {
                    await signInAnonymously(auth);
                } catch (err) {
                    setDbStatus('local_only'); 
                }
                };
                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                setUser(currentUser);
                if(currentUser && dbStatus !== 'local_only') {
                    setDbStatus('connected');
                }
                });

                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user || dbStatus === 'local_only' || !loggedInUser) return;

                const recordsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records');
                
                const unsubscribeData = onSnapshot(recordsRef, (snapshot) => {
                    let data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // 🌟 เก็บข้อมูลทั้งหมดไว้ก่อนโดนฟิลเตอร์ เพื่อใช้หารายชื่อผู้ร่วมงาน
                    setAllRecords(data);
                    
                    if (loggedInUser.role !== 'admin') {
                        data = data.filter(r => 
                        r.responsible && r.responsible.toLowerCase().includes(loggedInUser.filterName.toLowerCase())
                        );
                    }
                    
                    setRecords(data);
                    setDbStatus('connected');
                }, (error) => {
                    setDbStatus('local_only');
                });

                return () => unsubscribeData();
            }, [user, dbStatus, loggedInUser]);

            if (!loggedInUser) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            // 🌟 ฟังก์ชันช่วยดึง Date Object จากฟิลด์ date ของงาน (ใช้อ้างอิงเดือนที่เกิดงานจริง ไม่ใช่เดือนที่คีย์)
            const getRecordDateObj = (dateStr, createdAt) => {
                const currentYear = new Date().getFullYear(); // ดึงปีปัจจุบันของระบบ

                if (!dateStr) {
                    let d = new Date(createdAt || Date.now());
                    d.setFullYear(currentYear);
                    return d;
                }
                
                let s = String(dateStr).toLowerCase();
                let day = 1; // ค่าเริ่มต้น

                // 🌟 เพิ่มการค้นหา "วัน" (ตัวเลข 1-31) เพื่อป้องกันบัคงานไปกองรวมกันวันที่ 1 
                const dayMatch = s.match(/\b([1-9]|[12]\d|3[01])\b/);
                if (dayMatch) {
                    day = parseInt(dayMatch[1]);
                }

                // 1. ค้นหาชื่อเดือนภาษาไทยและอังกฤษจากข้อความ
                const monthKeywords = {
                    0: ['jan', 'ม.ค.', 'มกราคม'],
                    1: ['feb', 'ก.พ.', 'กุมภาพันธ์'],
                    2: ['mar', 'มี.ค.', 'มีนาคม'],
                    3: ['apr', 'เม.ย.', 'เมษายน'],
                    4: ['may', 'พ.ค.', 'พฤษภาคม'],
                    5: ['jun', 'มิ.ย.', 'มิถุนายน'],
                    6: ['jul', 'ก.ค.', 'กรกฎาคม'],
                    7: ['aug', 'ส.ค.', 'สิงหาคม'],
                    8: ['sep', 'ก.ย.', 'กันยายน'],
                    9: ['oct', 'ต.ค.', 'ตุลาคม'],
                    10: ['nov', 'พ.ย.', 'พฤศจิกายน'],
                    11: ['dec', 'ธ.ค.', 'ธันวาคม']
                };

                for (const [monthIdx, keywords] of Object.entries(monthKeywords)) {
                    if (keywords.some(kw => s.includes(kw))) {
                        // ดึงเอาวันที่ที่สกัดได้ มาใส่ด้วย
                        return new Date(currentYear, parseInt(monthIdx), day);
                    }
                }

                // 2. ค้นหารูปแบบ วัน/เดือน/ปี (เช่น 21/2/2026 หรือ 21-02-2567)
                const slashMatch = s.match(/(?:^|[^\d])(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})(?:[^\d]|$)/);
                if (slashMatch) {
                    const d = parseInt(slashMatch[1]);
                    const m = parseInt(slashMatch[2]) - 1; // ตำแหน่งที่ 2 คือเดือน
                    if (m >= 0 && m <= 11) {
                        return new Date(currentYear, m, d);
                    }
                }

                // 3. ลองใช้ new Date() มาตรฐานของ JavaScript (ลบคำนำหน้าและขีดออกก่อน)
                let cleanStr = s.replace(/^(date|วันที่)[\s:]*/i, '').replace(/^[-\s]+/, '').trim();
                let d = new Date(cleanStr);
                if (!isNaN(d.getTime())) {
                    d.setFullYear(currentYear);
                    return d;
                }

                // 4. Fallback ถ้าระบบอ่านไม่ออกจริงๆ (ใช้เดือนที่บันทึกข้อมูล)
                let fallbackDate = new Date(createdAt || Date.now());
                fallbackDate.setFullYear(currentYear);
                return fallbackDate;
            };

            const getSortValue = (dateStr, createdAt) => {
                return getRecordDateObj(dateStr, createdAt).getTime();
            };

            const sortedRecords = [...records].sort((a, b) => getSortValue(b.date, b.createdAt) - getSortValue(a.date, a.createdAt));

            const availableMonths = [...new Set(records.map(r => {
                // 🌟 เปลี่ยนมาใช้ getRecordDateObj เพื่อให้เอาเดือนจากช่อง Date แทนวันที่บันทึก (createdAt)
                const d = getRecordDateObj(r.date, r.createdAt);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            }))].sort().reverse();
            
            // 🌟 เพิ่มเดือนปัจจุบันเข้าไปในตัวเลือกเสมอ (เผื่อยังไม่มีงานในเดือนนี้)
            const currentYYYYMM = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
            if (!availableMonths.includes(currentYYYYMM)) {
                availableMonths.unshift(currentYYYYMM);
                availableMonths.sort().reverse();
            }

            // 🌟 คำนวณสัปดาห์ที่มีในระบบ
            const availableWeeks = [...new Set(records.map(r => {
                const d = getRecordDateObj(r.date, r.createdAt);
                return getLocalYYYYMMDD(getStartOfWeek(d));
            }))].sort().reverse();

            const currentWeekStr = getLocalYYYYMMDD(getStartOfWeek(new Date()));
            if (!availableWeeks.includes(currentWeekStr)) {
                availableWeeks.unshift(currentWeekStr);
                availableWeeks.sort().reverse();
            }

            const getTeamFromResponsible = (responsibleStr) => {
                if (!responsibleStr) return 'Unknown';
                const resLower = responsibleStr.toLowerCase();
                for (const key in APP_USERS) {
                    if (APP_USERS[key].role !== 'admin' && resLower.includes(APP_USERS[key].filterName.toLowerCase())) {

                    }
                }
                return 'Unknown';
            };

            // 🌟 ระบบประมวลผลตัวกรองแบบลึก (Deep Filtering) ครอบคลุมทุกสิทธิ์และเงื่อนไข
            const filteredRecords = sortedRecords.filter(r => {
                const d = getRecordDateObj(r.date, r.createdAt);
                const now = new Date();

                // 1. Time Filter
                let timeMatch = true;
                if (timeFilterType === 'month') {
                    const recordMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    timeMatch = selectedMonth ? recordMonth === selectedMonth : true;
                } else if (timeFilterType === 'week') {
                    if (selectedWeek) {
                        const recordWeekStart = getLocalYYYYMMDD(getStartOfWeek(d));
                        timeMatch = recordWeekStart === selectedWeek;
                    } else {
                        // ถ้าเลือกรายสัปดาห์แต่ยังไม่ได้เจาะจงสัปดาห์ (ดูภาพรวมทั้งเดือนที่เลือก)
                        const recordMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                        timeMatch = selectedMonth ? recordMonth === selectedMonth : true;
                    }
                } else if (timeFilterType === 'year') {
                    timeMatch = d.getFullYear() === now.getFullYear();
                }

                // 2. User Filter
                let userMatch = true;
                if (loggedInUser.role === 'admin' && selectedUserFilter) {
                    userMatch = r.responsible && r.responsible.toLowerCase().includes(selectedUserFilter.toLowerCase());
                }

                // 3. Team Filter (Admin)
                let teamMatch = true;
                if (loggedInUser.role === 'admin' && adminTeamFilter) {
                    const recordTeam = getTeamFromResponsible(r.responsible);
                    teamMatch = recordTeam === adminTeamFilter;
                }

                // 4. Job Type Filter (Admin)
                let jobTypeMatch = true;
                if (loggedInUser.role === 'admin' && adminJobTypeFilter) {
                    jobTypeMatch = r.jobType?.includes(adminJobTypeFilter);
                }

                return timeMatch && userMatch && teamMatch && jobTypeMatch;
            });

            const shortCount = filteredRecords.filter(r => r.jobType?.includes('Short')).length;
            const mediumCount = filteredRecords.filter(r => r.jobType?.includes('Medium')).length;
            const longCount = filteredRecords.filter(r => r.jobType?.includes('Long')).length;
            const surveyCount = filteredRecords.filter(r => r.jobType?.includes('Survey')).length;
            const correctiveCount = filteredRecords.filter(r => r.jobType?.includes('Corrective')).length;
            const preventiveCount = filteredRecords.filter(r => r.jobType?.includes('Preventive')).length;

            const stats = {
                totalJobs: filteredRecords.length,
                shortPeriod: shortCount,
                mediumPeriod: mediumCount,
                longPeriod: longCount,
                surveyCount: surveyCount,
                correctiveCount: correctiveCount,
                preventiveCount: preventiveCount,
                totalCost: (shortCount * 440) + (mediumCount * 660) + (longCount * 880) + (surveyCount * 330) + (correctiveCount * 440) + (preventiveCount * 440) 
            };

            const handleSaveRecord = async (newRecord) => {
                setShowForm(false);
                setEditingRecord(null);
                setActiveTab('history');
                
                if (dbStatus === 'local_only' || !user) {
                    if (editingRecord) {

                        setAllRecords(allRecords.map(r => r.id === editingRecord.id ? { ...newRecord, id: r.id, createdAt: r.createdAt } : r));
                    } else {
                        setRecords([{ ...newRecord, id: Date.now().toString(), createdAt: new Date().toISOString() }, ...records]);
                        setAllRecords([{ ...newRecord, id: Date.now().toString(), createdAt: new Date().toISOString() }, ...allRecords]);
                    }
                    return;
                }

                setDbStatus('connecting'); 
                const recordsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records');
                
                try {
                    if (editingRecord) {
                        const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', editingRecord.id);
                        await updateDoc(docRef, { ...newRecord, updatedAt: new Date().toISOString() });

                        <div className="flex gap-3">

        function ChangePasswordModal({ user, onClose, onSuccess }) {
            const [oldPass, setOldPass] = useState('');
            const [newPass, setNewPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const [error, setError] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');

                if (oldPass !== user.currentPass) {
                    setError('รหัสผ่านเดิมไม่ถูกต้อง');
                    return;
                }
                if (newPass.length < 6) {
                    setError('รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร');
                    return;
                }
                if (newPass !== confirmPass) {
                    setError('รหัสผ่านใหม่และการยืนยันรหัสไม่ตรงกัน');
                    return;
                }
                if (newPass === oldPass) {
                    setError('รหัสผ่านใหม่ต้องไม่ซ้ำกับรหัสผ่านเดิม');
                    return;
                }

                setIsSaving(true);
                try {
                    const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'user_credentials', user.username);
                    await setDoc(docRef, { password: newPass, updatedAt: new Date().toISOString() }, { merge: true });

        function Reports({ records, getSortValue, selectedMonth, selectedWeek, timeFilterType, allRecords }) {
            const [showPreview, setShowPreview] = useState(false);
            const [isExportingExcel, setIsExportingExcel] = useState(false);
            const [exportProgress, setExportProgress] = useState('');

            const handleExportExcel = async () => {
                setIsExportingExcel(true);
                setExportProgress('กำลังเตรียมระบบ...');
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const worksheet = workbook.addWorksheet('OT Report');
                    
                    worksheet.columns = [
                        { width: 5 },
                        { width: 20 },
                        { width: 45 },
                        { width: 25 },
                        { width: 25 }
                    ];

                    worksheet.mergeCells('A1:E1');
                    const titleCell = worksheet.getCell('A1');
                    
                    let reportTitleLabel = 'รายละเอียดปฏิบัติงานเบิกค่าล่วงเวลา (OT )';
                    if (timeFilterType === 'month' && selectedMonth) reportTitleLabel += ` ประจำเดือน ${formatMonth(selectedMonth)}`;
                    else if (timeFilterType === 'week') {
                        if (selectedWeek) reportTitleLabel += ` (สัปดาห์ ${formatWeekLabel(selectedWeek)})`;
                        else if (selectedMonth) reportTitleLabel += ` ประจำเดือน ${formatMonth(selectedMonth)}`;
                        else reportTitleLabel += ` (รายสัปดาห์)`;
                    }
                    else if (timeFilterType === 'year') reportTitleLabel += ` (ปีปัจจุบัน)`;
                    
                    titleCell.value = reportTitleLabel;
                    titleCell.font = { name: 'Tahoma', size: 14, bold: true };
                    titleCell.alignment = { vertical: 'middle', horizontal: 'left' };
                    
                    const fetchImageBase64 = async (url) => {
                        if (!url) return null;
                        if (url.startsWith('data:image')) return url; 
                        
                        try {
                            const urlObj = new URL(url);
                            const fileId = urlObj.searchParams.get('id');
                            if (!fileId) return null;

                            const response = await fetch(GAS_WEBHOOK_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'get_image', fileId: fileId }),
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                            });
                            const result = await response.json();
                            if (result.success) return result.base64;
                        } catch (e) {
                            console.error("Image proxy failed", e);
                        }
                        return null;
                    };

                    let currentRow = 2;
                    const sortedRecords = [...records].sort((a, b) => getSortValue(a.date, a.createdAt) - getSortValue(b.date, b.createdAt)); 
                    
                    for (let index = 0; index < sortedRecords.length; index++) {
                        const record = sortedRecords[index];
                        setExportProgress(`กำลังดึงรูปภาพ ${index + 1}/${sortedRecords.length}...`);
                        const i = index + 1;
                        
                        // 🌟 ค้นหารายชื่อผู้ร่วมงานสำหรับการ Export Excel
                        let displayResponsible = record.responsible;
                        if (allRecords && record.interruptionId && record.interruptionId !== '-') {
                            const coworkers = allRecords
                                .filter(r => r.interruptionId === record.interruptionId)
                                .map(r => r.responsible);
                            if (coworkers.length > 0) {
                                displayResponsible = [...new Set(coworkers)].join(', ');
                            }
                        }
                        
                        worksheet.addRow([i, 'JOB Type :', record.jobType, 'รูปก่อนทำ', 'รูปหลังทำ']);
                        worksheet.addRow(['', 'Interruption :', record.interruption, '', '']);
                        worksheet.addRow(['', 'Interruption ID :', record.interruptionId || '-', '', '']);
                        worksheet.addRow(['', 'Reason', record.reason || '-', '', '']);
                        worksheet.addRow(['', 'Location :', 'Location: ' + record.location, '', '']);
                        worksheet.addRow(['', 'Date :', 'Date: ' + record.date, '', '']);
                        worksheet.addRow(['', 'Time :', 'Time: ' + record.time, '', '']);
                        worksheet.addRow(['', 'NSB Responsible :', 'เจ้าหน้าที่ปฏิบัติงาน : ' + displayResponsible, '', '']);
                        
                        worksheet.mergeCells(`A${currentRow}:A${currentRow+7}`);
                        worksheet.mergeCells(`D${currentRow+1}:D${currentRow+7}`);
                        worksheet.mergeCells(`E${currentRow+1}:E${currentRow+7}`);
                        
                        for (let r = currentRow; r <= currentRow + 7; r++) {
                            const row = worksheet.getRow(r);
                            row.height = 18; 
                            row.eachCell({ includeEmpty: true }, (cell) => {
                                cell.font = { name: 'Tahoma', size: 10 };
                                cell.border = {
                                    top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'}
                                };
                                cell.alignment = { vertical: 'top', wrapText: true };
                            });
                        }
                        
                        worksheet.getCell(`A${currentRow}`).alignment = { vertical: 'middle', horizontal: 'center' };
                        worksheet.getCell(`A${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`B${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`C${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true, color: { argb: 'FFEA580C' } }; 
                        worksheet.getCell(`D${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`D${currentRow}`).alignment = { horizontal: 'center' };
                        worksheet.getCell(`E${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`E${currentRow}`).alignment = { horizontal: 'center' };
                        
                        const addImageToCell = async (imageUrl, colIndex0Based, currentR) => {
                            const base64String = await fetchImageBase64(imageUrl);
                            if (!base64String) return;
                            
                            const extMatch = base64String.match(/^data:image\/([a-zA-Z0-9]+);base64,/);
                            const ext = extMatch ? extMatch[1] : 'png';
                            const base64Data = base64String.replace(/^data:image\/[a-zA-Z0-9]+;base64,/, '');
                            const imgId = workbook.addImage({ base64: base64Data, extension: ext });
                            
                            worksheet.addImage(imgId, {
                                tl: { col: colIndex0Based, row: currentR },

                            });

        function OTForm({ onSave, onClose, initialData, loggedInUser, allRecords }) {
            const [isSmartPaste, setIsSmartPaste] = useState(false);
            const [isExtracting, setIsExtracting] = useState(false);
            const [rawText, setRawText] = useState('');
            const [uploadingState, setUploadingState] = useState({ beforeImage: false, afterImage: false });
            
            // 🌟 เพิ่ม state สำหรับจัดการหมวดหมู่งานหลัก
            let initialCategory = 'Interruption';
            if (initialData?.jobType) {
                if (initialData.jobType.includes('Survey')) initialCategory = 'Survey 1 Job';
                else if (initialData.jobType.includes('Corrective')) initialCategory = 'Corrective 1 Job';
                else if (initialData.jobType.includes('Preventive')) initialCategory = 'Preventive & Special 1 Job';
            }
            const [jobCategory, setJobCategory] = useState(initialCategory);

            const defaultResponsible = loggedInUser?.role === 'admin' ? '' : (loggedInUser?.displayName || '');

            const [formData, setFormData] = useState(initialData || {
                jobType: 'Interruption (Short Period)',
                interruption: '',
                interruptionId: '',
                reason: '',
                location: '',
                date: new Date().toISOString().split('T')[0],
                time: '18:00 - 21:00',
                responsible: defaultResponsible,
                duration: '3',
                beforeImage: null,
                afterImage: null
            });

            // 🌟 แก้ไขฟังก์ชันคำนวณประเภทงานให้พิจารณาหมวดหมู่ (Category) ด้วย
            const calculateJobType = (category, hours) => {
                if (category === 'Survey 1 Job') return 'Survey 1 Job';
                if (category === 'Corrective 1 Job') return 'Corrective 1 Job';
                if (category === 'Preventive & Special 1 Job') return 'Preventive & Special 1 Job';
                
                // สำหรับ Interruption
                const h = parseFloat(hours);
                if (h >= 7) return 'Interruption (Long Period)';
                if (h >= 5) return 'Interruption (Medium Period)';
                return 'Interruption (Short Period)';
            };

            useEffect(() => {
                const newType = calculateJobType(jobCategory, formData.duration);
                if (newType !== formData.jobType) {
                setFormData(prev => ({ ...prev, jobType: newType }));
                }
            }, [jobCategory, formData.duration]);

            const handleSmartPaste = async () => {
                if (!rawText.trim()) return;
                setIsExtracting(true);

                const cleanText = rawText
                .replace(/[\u200B-\u200F\u2028\u2029\u202A-\u202E\u2060-\u206F\uFEFF]/g, '')
                .replace(/：/g, ':');

                const extractFallback = (keywordsRegex) => {
                const match = cleanText.match(keywordsRegex);
                return match ? match[1].trim() : '';
                };

                // 🌟 ระบบสกัดชื่องานแบบใหม่ (รองรับการพิมพ์คำว่า 'รองรับงาน')
                let newInterruption = extractFallback(/(?:Interruption|รายละเอียดงาน|ชื่องาน|รายละเอียด)\s*[:=]\s*(.*)/i);
                
                if (!newInterruption) {
                    const matchJob = cleanText.match(/รองรับงาน\s*[:=]?\s*([\s\S]*?)(?=\n(?:Location|สถานที่|Date|วันที่|Time|เวลา|เจ้าหน้าที่|ผู้ปฏิบัติงาน|Interruption ID|ID|รหัส|Reason|เหตุผล)|$)/i);
                    if (matchJob) {
                        newInterruption = matchJob[1].trim().replace(/\n/g, ' ');
                    }
                }

                const newId = extractFallback(/(?:Interruption ID|ID|รหัสงาน|รหัส)\s*[:=]\s*(.*)/i);
                const newReason = extractFallback(/(?:Reason|เหตุผล|สาเหตุ)\s*[:=]\s*(.*)/i);
                const newLocation = extractFallback(/(?:Location|สถานที่|ที่ตั้ง|Site|ไซต์)\s*[:=]\s*(.*)/i);
                const newDate = extractFallback(/(?:Date|วันที่|วัน)\s*[:=]\s*(.*)/i);
                const newTime = extractFallback(/(?:Time|เวลา|ช่วงเวลา)\s*[:=]\s*(.*)/i);
                
                const finalInterruptionId = newId || ('AUTO-' + Math.floor(Math.random() * 1000000));
                const finalInterruption = newInterruption || 'ไม่ระบุรายละเอียดงาน';

                const resRegex = /(?:เจ้า\s*หน้า\s*ที่.*|ผู้\s*ป[ฏฎ]ิบัติ\s*งาน|NSB\s*Responsible|ทีมงาน)\s*[:=]\s*([\s\S]*)/i;
                const resMatch = cleanText.match(resRegex);
                let responsible = '';
                if (resMatch && resMatch[1]) {
                const lines = resMatch[1].split('\n');
                const validLines = [];
                for (let line of lines) {
                    const t = line.trim();
                    if (t.includes(':') && validLines.length > 0) break;
                    if (t) validLines.push(t);
                }
                responsible = validLines.join(', ').replace(/,,+/g, ',').replace(/,\s*,/g, ',');
                }

                const standardTime = newTime.replace(/\./g, ':').toLowerCase();

                let duration = '3';
                if (standardTime.includes('22:00') && standardTime.includes('06:00')) duration = '8';
                else if (standardTime.includes('22:00') && standardTime.includes('05:00')) duration = '7';
                else if (standardTime.includes('18:00') && standardTime.includes('21:00')) duration = '3';
                else if (standardTime.includes('21:00') && standardTime.includes('05:00')) duration = '8';
                else if (standardTime.includes(' – ') || standardTime.includes(' - ') || standardTime.includes('-') || standardTime.includes('ถึง')) {
                    const separator = standardTime.includes('ถึง') ? 'ถึง' : (standardTime.includes('–') ? '–' : '-');
                    const parts = standardTime.split(separator);
                    if (parts.length >= 2) {
                        const startMatch = parts[0].match(/(\d{1,2}):(\d{2})/);
                        const endMatch = parts[1].match(/(\d{1,2}):(\d{2})/);
                        
                        if (startMatch && endMatch) {
                            const startTotal = parseInt(startMatch[1], 10) + (parseInt(startMatch[2], 10) / 60);
                            let endTotal = parseInt(endMatch[1], 10) + (parseInt(endMatch[2], 10) / 60);
                            
                            if (!isNaN(startTotal) && !isNaN(endTotal)) {
                            if (endTotal <= startTotal) endTotal += 24; 
                            let diff = endTotal - startTotal;
                            duration = diff % 1 === 0 ? diff.toString() : diff.toFixed(1);
                            }
                        }
                    }
                }

                // 🌟 เมื่อใช้ Smart Paste บังคับให้หมวดหมู่กลับไปเป็น Interruption เสมอ
                setJobCategory('Interruption');

                setFormData({
                ...formData,
                interruption: finalInterruption,
                interruptionId: finalInterruptionId,
                reason: newReason || formData.reason,
                location: newLocation || formData.location,
                date: newDate || formData.date,
                time: newTime || formData.time,
                responsible: responsible || formData.responsible,
                duration: duration,
                jobType: calculateJobType('Interruption', duration)
                });
                
                setIsExtracting(false);
                setIsSmartPaste(false);
                setRawText('');
            };

            // 🌟 คำนวณรายชื่อเพื่อนร่วมงานทั้งหมด จากรหัสงานเดียวกัน เพื่อแสดงในหน้าฟอร์ม
            let displayCoworkers = '';
            if (formData.interruptionId && formData.interruptionId !== '-' && allRecords) {
                const team = allRecords
                    .filter(r => r.interruptionId === formData.interruptionId)
                    .map(r => r.responsible);
                if (team.length > 0) {
                    displayCoworkers = [...new Set(team)].join(', ');
                }
            }

            const handleImageUpload = async (e, type) => {
                const file = e.target.files[0];
                if (!file) return;

                if (GAS_WEBHOOK_URL === 'ใส่_URL_WEB_APP_ของ_GAS_ที่นี่') {
                    alert('กรุณานำ Web App URL ของ Google Apps Script มาใส่ในบรรทัดที่ 26 ของโค้ดก่อนทำการอัปโหลดรูปภาพ');
                    return;
                }

                setUploadingState(prev => ({ ...prev, [type]: true }));

                try {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = async () => {
                            const MAX_WIDTH = 800;
                            let width = img.width;
                            let height = img.height;
                            
                            if (width > MAX_WIDTH) {
                                height = height * (MAX_WIDTH / width);
                                width = MAX_WIDTH;
                            }
                            
                            const canvas = document.createElement('canvas');
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            
                            const base64String = canvas.toDataURL('image/jpeg', 0.7);
                            const base64Data = base64String.split(',')[1];
                            
                            try {
                                const response = await fetch(GAS_WEBHOOK_URL, {
                                    method: 'POST',
                                    redirect: 'follow', 
                                    body: JSON.stringify({
                                        action: 'upload_image',
                                        filename: `OT_${type}_${Date.now()}.jpg`,
                                        mimeType: 'image/jpeg',
                                        base64: base64Data
                                    }),
                                    headers: { 
                                        'Content-Type': 'text/plain;charset=utf-8'
                                    }
                                });
                                
                                const textResponse = await response.text();
                                
                                if (textResponse.trim() === "OK") {
                                     throw new Error("ระบบฝั่ง Google Apps Script ตอบกลับเป็นข้อความธรรมดา (OK) แทนที่จะเป็น URL ของรูปภาพ โปรดตรวจสอบฟังก์ชัน doPost ใน GAS");
                                }
                                
                                let result;
                                try {
                                    result = JSON.parse(textResponse);
                                } catch (parseError) {
                                    console.error("Non-JSON response from GAS:", textResponse);
                                    throw new Error("ระบบตอบกลับมาผิดรูปแบบ (โปรดตรวจสอบสิทธิ์ Who has access ในตั้งค่า GAS ให้เป็น Anyone)");
                                }
                                
                                if (result && result.success) {
                                    setFormData(prev => ({ ...prev, [type]: result.url }));
                                } else {
                                    alert('อัปโหลดรูปล้มเหลว: ' + (result?.error || 'ไม่ทราบสาเหตุ'));
                                }
                            } catch (err) {
                                console.error('Upload API Error:', err);
                                if (err.message.includes('Failed to fetch')) {
                                    alert(`🚨 การส่งรูปถูกบล็อก (Failed to fetch)\n\nวิธีแก้ไข (ทำที่หน้าเว็บ Google Apps Script):\n1. มุมขวาบน กดปุ่มสีน้ำเงิน 'การทำให้ใช้งานได้' (Deploy)\n2. เลือก 'จัดการการทำให้ใช้งานได้' (Manage deployments)\n3. กดรูป ✏️ ดินสอแก้ไข\n4. สำคัญที่สุด! ตรง 'ผู้มีสิทธิ์เข้าถึง (Who has access)' ต้องเลือกเป็น "ทุกคน (Anyone)" เท่านั้น\n5. กดอัปเดตเวอร์ชันใหม่ แล้วก๊อปปี้ URL (ที่ลงท้ายด้วย /exec) มาใส่ในหน้าเว็บอีกครั้งครับ`);
                                } else {
                                    alert(`เกิดข้อผิดพลาดในการส่งรูป:\n${err.message}`);
                                }
                            } finally {
                                setUploadingState(prev => ({ ...prev, [type]: false }));
                            }
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
