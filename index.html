        );
    }

        function OTForm({ onSave, onClose, initialData, loggedInUser, allRecords }) {
            const [isSmartPaste, setIsSmartPaste] = useState(false);
            const [isExtracting, setIsExtracting] = useState(false);
            const [rawText, setRawText] = useState('');
            const [uploadingState, setUploadingState] = useState({ beforeImage: false, afterImage: false });
            
            let initialCategory = 'Interruption';
            if (initialData?.jobType) {
                if (initialData.jobType.includes('Survey')) initialCategory = 'Survey 1 Job';
                else if (initialData.jobType.includes('Corrective')) initialCategory = 'Corrective 1 Job';
                else if (initialData.jobType.includes('Preventive')) initialCategory = 'Preventive & Special 1 Job';
            }
            const [jobCategory, setJobCategory] = useState(initialCategory);

            const defaultResponsible = (loggedInUser?.role === 'admin' || loggedInUser?.role === 'approver2') ? '' : (loggedInUser?.displayName || '');

            const [formData, setFormData] = useState(initialData || {
                jobType: 'Interruption (Short Period)',
                interruption: '',
                interruptionId: '',
                reason: '',
                location: '',
                date: new Date().toISOString().split('T')[0],
                time: '18:00 - 21:00',
                responsible: defaultResponsible,
                duration: '3',
                beforeImage: null,
                afterImage: null,
                status: 'draft' 
            });

            const calculateJobType = (category, hours) => {
                if (category === 'Survey 1 Job') return 'Survey 1 Job';
                if (category === 'Corrective 1 Job') return 'Corrective 1 Job';
                if (category === 'Preventive & Special 1 Job') return 'Preventive & Special 1 Job';
                
                const h = parseFloat(hours);
                if (h >= 7) return 'Interruption (Long Period)';
                if (h >= 5) return 'Interruption (Medium Period)';
                return 'Interruption (Short Period)';
            };

            useEffect(() => {
                const newType = calculateJobType(jobCategory, formData.duration);
                if (newType !== formData.jobType) {
                setFormData(prev => ({ ...prev, jobType: newType }));
                }
            }, [jobCategory, formData.duration]);

            const handleSmartPaste = async () => {
                if (!rawText.trim()) return;
                setIsExtracting(true);

                const cleanText = rawText
                .replace(/[\u200B-\u200F\u2028\u2029\u202A-\u202E\u2060-\u206F\uFEFF]/g, '')
                .replace(/：/g, ':');

                const extractFallback = (keywordsRegex) => {
                const match = cleanText.match(keywordsRegex);
                return match ? match[1].trim() : '';
                };

                let newInterruption = extractFallback(/(?:Interruption|รายละเอียดงาน|ชื่องาน|รายละเอียด)\s*[:=]\s*(.*)/i);
                
                if (!newInterruption) {
                    const matchJob = cleanText.match(/รองรับงาน\s*[:=]?\s*([\s\S]*?)(?=\n(?:Location|สถานที่|Date|วันที่|Time|เวลา|เจ้าหน้าที่|ผู้ปฏิบัติงาน|Interruption ID|ID|รหัส|Reason|เหตุผล)|$)/i);
                    if (matchJob) {
                        newInterruption = matchJob[1].trim().replace(/\n/g, ' ');
                    }
                }

                const newId = extractFallback(/(?:Interruption ID|ID|รหัสงาน|รหัส)\s*[:=]\s*(.*)/i);
                const newReason = extractFallback(/(?:Reason|เหตุผล|สาเหตุ)\s*[:=]\s*(.*)/i);
                const newLocation = extractFallback(/(?:Location|สถานที่|ที่ตั้ง|Site|ไซต์)\s*[:=]\s*(.*)/i);
                const newDate = extractFallback(/(?:Date|วันที่|วัน)\s*[:=]\s*(.*)/i);
                const newTime = extractFallback(/(?:Time|เวลา|ช่วงเวลา)\s*[:=]\s*(.*)/i);
                
                const finalInterruptionId = newId || ('AUTO-' + Math.floor(Math.random() * 1000000));
                const finalInterruption = newInterruption || 'No details provided';

                let finalResponsible = defaultResponsible;
                const resRegex = /(?:เจ้า\s*หน้า\s*ที่.*|ผู้\s*ป[ฏฎ]ิบัติ\s*งาน|NSB\s*Responsible|ทีมงาน)\s*[:=]\s*([\s\S]*)/i;
                const resMatch = cleanText.match(resRegex);
                if (resMatch && resMatch[1]) {
                    const lines = resMatch[1].split('\n');
                    const validLines = [];
                    for (let line of lines) {
                        const t = line.trim();
                        if (t.includes(':') && validLines.length > 0) break;
                        if (t) validLines.push(t);
                    }
                    finalResponsible = validLines.join(', ').replace(/,,+/g, ',').replace(/,\s*,/g, ',');
                }
                if (!finalResponsible) finalResponsible = defaultResponsible;

                const standardTime = newTime.replace(/\./g, ':').toLowerCase();

                let duration = '3';
                if (standardTime.includes('22:00') && standardTime.includes('06:00')) duration = '8';
                else if (standardTime.includes('22:00') && standardTime.includes('05:00')) duration = '7';
                else if (standardTime.includes('18:00') && standardTime.includes('21:00')) duration = '3';
                else if (standardTime.includes('21:00') && standardTime.includes('05:00')) duration = '8';
                else if (standardTime.includes(' – ') || standardTime.includes(' - ') || standardTime.includes('-') || standardTime.includes('ถึง')) {
                    const separator = standardTime.includes('ถึง') ? 'ถึง' : (standardTime.includes('–') ? '–' : '-');
                    const parts = standardTime.split(separator);
                    if (parts.length >= 2) {
                        const startMatch = parts[0].match(/(\d{1,2}):(\d{2})/);
                        const endMatch = parts[1].match(/(\d{1,2}):(\d{2})/);
                        
                        if (startMatch && endMatch) {
                            const startTotal = parseInt(startMatch[1], 10) + (parseInt(startMatch[2], 10) / 60);
                            let endTotal = parseInt(endMatch[1], 10) + (parseInt(endMatch[2], 10) / 60);
                            
                            if (!isNaN(startTotal) && !isNaN(endTotal)) {
                            if (endTotal <= startTotal) endTotal += 24; 
                            let diff = endTotal - startTotal;
                            duration = diff % 1 === 0 ? diff.toString() : diff.toFixed(1);
                            }
                        }
                    }
                }

                setJobCategory('Interruption');

                setFormData({
                ...formData,
                interruption: finalInterruption,
                interruptionId: finalInterruptionId,
                reason: newReason || formData.reason,
                location: newLocation || formData.location,
                date: newDate || formData.date,
                time: newTime || formData.time,
                responsible: finalResponsible,
                duration: duration,
                jobType: calculateJobType('Interruption', duration)
                });
                
                setIsExtracting(false);
                setIsSmartPaste(false);
                setRawText('');
            };

            let displayCoworkers = '';
            if (formData.interruptionId && formData.interruptionId !== '-' && allRecords) {
                const team = allRecords
                    .filter(r => r.interruptionId === formData.interruptionId)
                    .map(r => r.responsible);
                if (team.length > 0) {
                    displayCoworkers = [...new Set(team)].join(', ');
                }
            }

            // 🌟 ถ้าระบบล็อกจะห้ามแก้ไข (ปรับให้ล็อก "เฉพาะ" ตอน pending_1 และ pending_2 เท่านั้น)
            const isLocked = initialData && (initialData.status === 'pending_1' || initialData.status === 'pending_2');
            const canEdit = loggedInUser?.role === 'admin' || !isLocked;

            const handleImageUpload = async (e, type) => {
                if (!canEdit) return;
                const file = e.target.files[0];
                
                e.target.value = null; 

                if (!file) return;

                console.log("Preparing to embed image directly to Firebase:", file.name, "Type:", type);

                setUploadingState(prev => ({ ...prev, [type]: true }));

                try {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.onload = () => {
                            try {
                                console.log("Compressing image for Firebase storage...");
                                const MAX_DIMENSION = 600; 
                                let width = img.width;
                                let height = img.height;
                                
                                if (width > height) {
                                    if (width > MAX_DIMENSION) {
                                        height = Math.round(height * (MAX_DIMENSION / width));
                                        width = MAX_DIMENSION;
                                    }
                                } else {
                                    if (height > MAX_DIMENSION) {
                                        width = Math.round(width * (MAX_DIMENSION / height));
                                        height = MAX_DIMENSION;
                                    }
                                }
                                
                                const canvas = document.createElement('canvas');
                                canvas.width = width;
                                canvas.height = height;
                                const ctx = canvas.getContext('2d');
                                
                                ctx.fillStyle = '#FFFFFF';
                                ctx.fillRect(0, 0, width, height);
                                
                                ctx.drawImage(img, 0, 0, width, height);
                                
                                const base64String = canvas.toDataURL('image/jpeg', 0.5);
                                
                                const sizeInKB = Math.round((base64String.length * (3/4)) / 1024);
                                console.log(`Image compressed. Estimated size: ${sizeInKB} KB`);

                                if (sizeInKB > 500) {
                                    alert(`ภาพมีขนาดใหญ่เกินไป (${sizeInKB} KB) กรุณาใช้ภาพอื่นที่รายละเอียดน้อยกว่านี้ครับ`);
                                    setUploadingState(prev => ({ ...prev, [type]: false }));
                                    return;
                                }

                                setFormData(prev => ({ ...prev, [type]: base64String }));
                                setUploadingState(prev => ({ ...prev, [type]: false }));

                            } catch (err) {
                                console.error('Compression Error:', err);
                                alert(`Error compressing image:\n${err.message}`);
                                setUploadingState(prev => ({ ...prev, [type]: false }));
                            }
                        };
                        
                        img.onerror = (err) => {
                            console.error("Cannot load image into Image object", err);
                            setUploadingState(prev => ({ ...prev, [type]: false }));
                            alert("Cannot read this image file. Try another one.");
                        };

                        img.src = event.target.result;
                    };
                    
                    reader.onerror = (err) => {
                        console.error("FileReader Error:", err);
                        setUploadingState(prev => ({ ...prev, [type]: false }));
                        alert("Error reading file from your device.");
                    };

                    reader.readAsDataURL(file);
                } catch (error) {
                    console.error("Main Image Embed Error:", error);
                    setUploadingState(prev => ({ ...prev, [type]: false }));
                    alert('Unknown error occurred while preparing image.');
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!canEdit) return;
                onSave(formData);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                <div className="relative bg-white w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col max-h-[90vh] border border-slate-200">
                    <div className="p-6 border-b border-slate-100 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <h3 className="text-xl font-bold text-slate-800">{initialData ? (canEdit ? 'Edit OT Record' : 'View OT Record (Locked)') : 'New OT Record'}</h3>
                        {!initialData && canEdit && (
                        <button 
                            type="button"
                            onClick={() => setIsSmartPaste(!isSmartPaste)}
                            className={`flex items-center gap-2 px-3 py-1.5 rounded-full text-xs font-bold transition-all border ${
                            isSmartPaste ? 'bg-orange-500 text-white border-orange-500 shadow-md shadow-orange-500/20' : 'bg-orange-50 text-orange-600 border-orange-100 hover:bg-orange-100'
                            }`}
                        >
                            {isSmartPaste ? <X size={14} /> : <Sparkles size={14} />}
                            {isSmartPaste ? 'Cancel Paste' : 'Smart Paste'}
                        </button>
                        )}
                    </div>
                    <button onClick={onClose} className="p-2 text-slate-400 hover:text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-full transition-colors">
                        <X size={20} />
                    </button>
                    </div>
                    
                    <form onSubmit={handleSubmit} className="p-6 overflow-y-auto space-y-6">
                    {isSmartPaste ? (
                        <div className="space-y-4 animate-in fade-in slide-in-from-top-2 duration-300">
                        <div className="bg-orange-50 border border-orange-200 p-4 rounded-xl flex items-start gap-3">
                            <ClipboardPaste className="text-orange-500 shrink-0 mt-1" size={20} />
                            <div className="text-sm text-orange-800">
                            <p className="font-bold">Paste OT Request Message</p>
                            <p className="opacity-80 mt-1">Paste message from LINE to auto-fill the form.</p>
                            </div>
                        </div>
                        <textarea 
                            rows="8"
                            autoFocus
                            disabled={isExtracting || !canEdit}
                            placeholder="Paste text here..."
                            className={`w-full bg-slate-50 border-2 rounded-2xl px-4 py-4 text-slate-700 text-sm focus:border-orange-500 focus:bg-white outline-none transition-all ${isExtracting ? 'opacity-50 border-slate-200' : 'border-slate-200'}`}
                            value={rawText}
                            onChange={e => setRawText(e.target.value)}
                        />
                        <button 
                            type="button"
                            disabled={isExtracting || !canEdit}
                            onClick={handleSmartPaste}
                            className="w-full bg-orange-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-orange-500/30 hover:bg-orange-600 transition-all flex items-center justify-center gap-2 disabled:bg-slate-300 disabled:shadow-none"
                        >
                            {isExtracting ? (
                            <>
                                <Loader2 size={18} className="animate-spin" /> Processing...
                            </>
                            ) : (
                            <>
                                <Sparkles size={18} /> Auto-fill Form
                            </>
                            )}
                        </button>
                        </div>
                    ) : (
                        <>
                        {!canEdit && (
                            <div className="bg-amber-50 text-amber-700 border border-amber-200 p-3 rounded-xl flex items-center gap-2 text-xs font-bold mb-4">
                                <Lock size={14} /> This record is locked as it is pending approval. Ask your manager to reject it if changes are needed.
                            </div>
                        )}

                        <div className="bg-orange-50 border border-orange-100 p-4 rounded-2xl flex items-center justify-between shadow-sm">
                            <div className="flex-1">
                                <label className="text-[10px] font-black text-orange-500 uppercase tracking-widest">Job Type</label>
                                <select 
                                    className="w-full text-base sm:text-lg font-black text-slate-800 bg-transparent outline-none cursor-pointer mt-1"
                                    value={jobCategory}
                                    disabled={!canEdit}
                                    onChange={e => setJobCategory(e.target.value)}
                                >
                                    <option value="Interruption">Interruption (Hourly)</option>
                                    <option value="Survey 1 Job">Survey (330.-)</option>
                                    <option value="Corrective 1 Job">Corrective (440.-)</option>
                                    <option value="Preventive & Special 1 Job">Preventive & Special (440.-)</option>
                                </select>
                                <div className="text-xs text-orange-600 font-bold mt-1">Summary: {formData.jobType}</div>
                            </div>
                            <div className={`p-2 rounded-xl shadow-sm border flex flex-col items-center min-w-[80px] transition-all ${jobCategory === 'Interruption' ? 'bg-white border-orange-100' : 'bg-slate-100 border-slate-200 opacity-60'}`}>
                                <span className="text-[10px] text-slate-400 font-bold">HOURS</span>
                                <input 
                                    type="number"
                                    step="0.5"
                                    disabled={jobCategory !== 'Interruption' || !canEdit}
                                    className="w-full text-center text-xl font-black text-orange-600 bg-transparent outline-none disabled:text-slate-500"
                                    value={formData.duration}
                                    onChange={e => setFormData({...formData, duration: e.target.value})}
                                />
                            </div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-1.5">
                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Interruption ID</label>
                            <input 
                                type="text"
                                placeholder="INT2602-00027"
                                disabled={!canEdit}
                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors font-medium disabled:opacity-70"
                                value={formData.interruptionId}
                                onChange={e => setFormData({...formData, interruptionId: e.target.value})}
                            />
                            </div>
                            <div className="space-y-1.5">
                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Time</label>
                            <input 
                                type="text"
                                placeholder="22:00 – 06:00"
                                disabled={!canEdit}
                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors font-medium disabled:opacity-70"
                                value={formData.time}
                                onChange={e => setFormData({...formData, time: e.target.value})}
                            />
                            </div>
                        </div>

                        <div className="space-y-1.5">
                            <label className="text-xs font-bold text-orange-600 uppercase tracking-wider">Interruption Details</label>
                            <textarea 
                            required
                            rows="2"
                            disabled={!canEdit}
                            placeholder="Work details..."
                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors font-medium disabled:opacity-70"
                            value={formData.interruption}
                            onChange={e => setFormData({...formData, interruption: e.target.value})}
                            />
                        </div>

                        <div className="space-y-1.5">
                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wider">Reason</label>
                            <input 
                            type="text"
                            placeholder="e.g. Relocating cables..."
                            disabled={!canEdit}
                            className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors font-medium disabled:opacity-70"
                            value={formData.reason}
                            onChange={e => setFormData({...formData, reason: e.target.value})}
                            />
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="space-y-1.5">
                            <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1">
                                <MapPin size={12} className="text-orange-500" /> Location
                            </label>
                            <input 
                                required
                                type="text"
                                placeholder="Location..."
                                disabled={!canEdit}
                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors font-medium disabled:opacity-70"
                                value={formData.location}
                                onChange={e => setFormData({...formData, location: e.target.value})}
                            />
                            </div>
                            <div className="space-y-1.5">
                            <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1">
                                <Calendar size={12} className="text-orange-500" /> Date
                            </label>
                            <input 
                                required
                                type="text"
                                placeholder="e.g. Feb 24, 2026"
                                disabled={!canEdit}
                                className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors font-medium disabled:opacity-70"
                                value={formData.date}
                                onChange={e => setFormData({...formData, date: e.target.value})}
                            />
                            </div>
                        </div>

                        <div className="space-y-1.5">
                            <label className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1">
                            <Users size={12} className="text-orange-500" /> Responsible Staff
                            </label>
                            <input 
                            required
                            type="text"
                            placeholder="e.g. Arttapon.J, Apiwat.S"
                            disabled={!!initialData && loggedInUser?.role !== 'admin' && loggedInUser?.role !== 'approver2'}
                            className={`w-full border rounded-xl px-4 py-2.5 text-slate-700 font-medium transition-colors ${!!initialData && loggedInUser?.role !== 'admin' && loggedInUser?.role !== 'approver2' ? 'bg-slate-100 border-slate-200 cursor-not-allowed opacity-80' : 'bg-slate-50 border-slate-200 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500'}`}
                            value={formData.responsible}
                            onChange={e => setFormData({...formData, responsible: e.target.value})}
                            />
                            
                            {displayCoworkers && (
                                <div className="mt-2 p-3 bg-indigo-50/50 border border-indigo-100 rounded-xl text-xs text-slate-600 flex items-start gap-2 shadow-sm">
                                    <Users size={14} className="text-indigo-400 mt-0.5 shrink-0" />
                                    <div className="font-medium">
                                        <span className="font-bold text-indigo-700">All team members in this job:</span> 
                                        <div className="mt-1 text-slate-600 break-words">{displayCoworkers}</div>
                                    </div>
                                </div>
                            )}

                            {loggedInUser?.role === 'user' && !initialData && (
                            <p className="text-[10px] text-orange-500 font-bold ml-1 pt-1">
                                * You can add multiple names separated by commas. The system will auto-split records.
                            </p>
                            )}
                            {loggedInUser?.role === 'user' && initialData && (
                            <p className="text-[10px] text-orange-500 font-bold ml-1 pt-1">
                                * Name is locked to you to prevent conflicts with teammates.
                            </p>
                            )}
                        </div>

                        <div className="grid grid-cols-2 gap-4 pt-2">
                            <div className={`relative border-2 border-dashed border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center gap-2 text-slate-400 ${canEdit ? 'hover:border-orange-400 hover:text-orange-500 hover:bg-orange-50/50 cursor-pointer' : ''} transition-all bg-slate-50 overflow-hidden h-32 group`}>
                            {canEdit && <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'beforeImage')} disabled={uploadingState.beforeImage} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10 disabled:cursor-not-allowed" />}
                            {uploadingState.beforeImage ? (
                                <div className="absolute inset-0 bg-white/90 flex flex-col items-center justify-center text-orange-500 z-20">
                                    <Loader2 className="animate-spin mb-2" size={24} />
                                    <span className="text-[10px] font-bold uppercase tracking-widest">Uploading...</span>
                                </div>
                            ) : formData.beforeImage ? (
                                <>
                                <img src={getDisplayImageUrl(formData.beforeImage)} alt="Before" className="absolute inset-0 w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/400x300?text=Image+Blocked'; }} />
                                {canEdit && (
                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center text-white z-0">
                                        <Upload size={20} className="mb-1" />
                                        <span className="text-[10px] font-bold">Change</span>
                                    </div>
                                )}
                                </>
                            ) : (
                                <>
                                <Upload size={24} />
                                <span className="text-[10px] font-bold uppercase tracking-widest text-center">Upload<br/>BEFORE</span>
                                </>
                            )}
                            </div>

                            <div className={`relative border-2 border-dashed border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center gap-2 text-slate-400 ${canEdit ? 'hover:border-orange-400 hover:text-orange-500 hover:bg-orange-50/50 cursor-pointer' : ''} transition-all bg-slate-50 overflow-hidden h-32 group`}>
                            {canEdit && <input type="file" accept="image/*" onChange={(e) => handleImageUpload(e, 'afterImage')} disabled={uploadingState.afterImage} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10 disabled:cursor-not-allowed" />}
                            {uploadingState.afterImage ? (
                                <div className="absolute inset-0 bg-white/90 flex flex-col items-center justify-center text-orange-500 z-20">
                                    <Loader2 className="animate-spin mb-2" size={24} />
                                    <span className="text-[10px] font-bold uppercase tracking-widest">Uploading...</span>
                                </div>
                            ) : formData.afterImage ? (
                                <>
                                <img src={getDisplayImageUrl(formData.afterImage)} alt="After" className="absolute inset-0 w-full h-full object-cover opacity-90 group-hover:opacity-100 transition-opacity" onError={(e) => { e.target.onerror = null; e.target.src = 'https://via.placeholder.com/400x300?text=Image+Blocked'; }} />
                                {canEdit && (
                                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center text-white z-0">
                                        <Upload size={20} className="mb-1" />
                                        <span className="text-[10px] font-bold">Change</span>
                                    </div>
                                )}
                                </>
                            ) : (
                                <>
                                <Upload size={24} />
                                <span className="text-[10px] font-bold uppercase tracking-widest text-center">Upload<br/>AFTER</span>
                                </>
                            )}
                            </div>
                        </div>
                        </>
                    )}
                    </form>

                    <div className="p-6 border-t border-slate-100 flex gap-3 bg-slate-50 rounded-b-2xl">
                    <button 
                        type="button"
                        onClick={onClose}
                        className="flex-1 px-4 py-3 border border-slate-200 text-slate-600 rounded-xl font-bold hover:bg-white hover:text-slate-800 transition-colors"
                    >
                        {canEdit ? 'Cancel' : 'Close'}
                    </button>
                    {!isSmartPaste && canEdit && (
                        <button 
                        onClick={handleSubmit}
                        className="flex-1 px-4 py-3 bg-orange-500 text-white rounded-xl font-bold hover:bg-orange-600 shadow-lg shadow-orange-500/30 transition-all"
                        >
                        {initialData ? 'Save Changes' : 'Save Record'}
                        </button>
                    )}
                    </div>
                </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
