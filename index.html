        // 🌟 Helper Functions
        const formatMonth = (YYYYMM) => {
            if (!YYYYMM) return 'All Time';
            const [year, month] = YYYYMM.split('-');
            const date = new Date(year, month - 1);
            return date.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        };

        const getStartOfWeek = (date) => {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setHours(0,0,0,0)).setDate(diff);
        };
        const getEndOfWeek = (date) => {
            const d = new Date(getStartOfWeek(date));
            return new Date(d.setDate(d.getDate() + 6)).setHours(23,59,59,999);
        };
        const getLocalYYYYMMDD = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };
        const formatWeekLabel = (startDateStr) => {
            if (!startDateStr) return 'All Time';
            const start = new Date(startDateStr);
            const end = new Date(getEndOfWeek(start));
            const formatOpt = { day: 'numeric', month: 'short' };
            const formatOptYear = { day: 'numeric', month: 'short', year: 'numeric' };
            return `${start.toLocaleDateString('en-US', formatOpt)} - ${end.toLocaleDateString('en-US', formatOptYear)}`;
        };

        const getDisplayImageUrl = (url) => {
            if (!url) return '';
            try {
                if (url.includes('drive.google.com') && url.includes('id=')) {
                    const urlObj = new URL(url);
                    const fileId = urlObj.searchParams.get('id');
                    if (fileId) return `https://lh3.googleusercontent.com/d/${fileId}`;
                } else if (url.includes('drive.google.com/file/d/')) {
                    const fileId = url.split('/d/')[1].split('/')[0];
                    if (fileId) return `https://lh3.googleusercontent.com/d/${fileId}`;
                }
            } catch(e) {
                console.error("Error formatting image URL:", e);
            }
            return url;
        };

        const isUserMatch = (recordResponsible, userObj) => {
            if (!recordResponsible || !userObj) return false;
            const resLower = recordResponsible.toLowerCase().trim();
            const filterLower = userObj.filterName.toLowerCase().trim();
            const displayLower = userObj.displayName.toLowerCase().trim();
            
            if (resLower.includes(filterLower) || resLower.includes(displayLower) || (filterLower === 'test' && resLower === 'test')) {
                return true;
            }
            
            if (userObj.aliases && Array.isArray(userObj.aliases)) {
                for (const alias of userObj.aliases) {
                    if (resLower.includes(alias.toLowerCase().trim())) return true;
                }
            }
            
            if (resLower.includes('.')) return false;
            
            const filterFirstName = filterLower.split('.')[0];
            const displayFirstName = displayLower.split('.')[0];
            
            if (resLower.includes(filterFirstName) || resLower.includes(displayFirstName)) return true;
            
            if (userObj.aliases && Array.isArray(userObj.aliases)) {
                for (const alias of userObj.aliases) {
                    const aliasFirstName = alias.toLowerCase().split('.')[0].trim();
                    if (resLower.includes(aliasFirstName)) return true;
                }
            }
            
            return false;
        };

            const [adminTeamFilter, setAdminTeamFilter] = useState('');
            const [adminJobTypeFilter, setAdminJobTypeFilter] = useState('');
            
            const [recordToDelete, setRecordToDelete] = useState(null); 
            const [showChangePassword, setShowChangePassword] = useState(false); 
            const [isBatchUpdating, setIsBatchUpdating] = useState(false);
            
            const [user, setUser] = useState(null);
            const [dbStatus, setDbStatus] = useState('connecting');

            const handleLogin = (userData) => {
                setLoggedInUser(userData);
                localStorage.setItem('ot_user', JSON.stringify(userData));
            };

            const handleLogout = () => {
                setLoggedInUser(null);
                localStorage.removeItem('ot_user');
                setRecords([]);
                setAllRecords([]);
            };

            useEffect(() => {
                const initAuth = async () => {
                try {
                    await signInAnonymously(auth);
                } catch (err) {
                    setDbStatus('local_only'); 
                }
                };
                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                setUser(currentUser);
                if(currentUser && dbStatus !== 'local_only') {
                    setDbStatus('connected');
                }
                });

                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user || dbStatus === 'local_only' || !loggedInUser) return;

                const recordsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records');
                
                const unsubscribeData = onSnapshot(recordsRef, (snapshot) => {
                    let data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllRecords(data);
                    
                    if (loggedInUser.role === 'user') {
                        data = data.filter(r => isUserMatch(r.responsible, loggedInUser));
                    } else if (loggedInUser.role === 'approver1') {
                        data = data.filter(r => {
                            const isSelf = isUserMatch(r.responsible, loggedInUser);
                            const isTeam = getTeamFromResponsible(r.responsible) === loggedInUser.approveTeam;
                            return isSelf || isTeam;
                        });
                    }
                    
                    setRecords(data);
                    setDbStatus('connected');
                }, (error) => {
                    setDbStatus('local_only');
                });

                return () => unsubscribeData();
            }, [user, dbStatus, loggedInUser]);

            if (!loggedInUser) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            const getRecordDateObj = (dateStr, createdAt) => {
                const currentYear = new Date().getFullYear();

                if (!dateStr) {
                    let d = new Date(createdAt || Date.now());
                    d.setFullYear(currentYear);
                    return d;
                }
                
                let s = String(dateStr).toLowerCase();
                let day = 1;

                const dayMatch = s.match(/\b([1-9]|[12]\d|3[01])\b/);
                if (dayMatch) {
                    day = parseInt(dayMatch[1]);
                }

                const monthKeywords = {
                    0: ['jan', 'ม.ค.', 'มกราคม'], 1: ['feb', 'ก.พ.', 'กุมภาพันธ์'],
                    2: ['mar', 'มี.ค.', 'มีนาคม'], 3: ['apr', 'เม.ย.', 'เมษายน'],
                    4: ['may', 'พ.ค.', 'พฤษภาคม'], 5: ['jun', 'มิ.ย.', 'มิถุนายน'],
                    6: ['jul', 'ก.ค.', 'กรกฎาคม'], 7: ['aug', 'ส.ค.', 'สิงหาคม'],
                    8: ['sep', 'ก.ย.', 'กันยายน'], 9: ['oct', 'ต.ค.', 'ตุลาคม'],
                    10: ['nov', 'พ.ย.', 'พฤศจิกายน'], 11: ['dec', 'ธ.ค.', 'ธันวาคม']
                };

                for (const [monthIdx, keywords] of Object.entries(monthKeywords)) {
                    if (keywords.some(kw => s.includes(kw))) {
                        return new Date(currentYear, parseInt(monthIdx), day);
                    }
                }

                const slashMatch = s.match(/(?:^|[^\d])(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})(?:[^\d]|$)/);
                if (slashMatch) {
                    const d = parseInt(slashMatch[1]);
                    const m = parseInt(slashMatch[2]) - 1;
                    if (m >= 0 && m <= 11) {
                        return new Date(currentYear, m, d);
                    }
                }

                let cleanStr = s.replace(/^(date|วันที่)[\s:]*/i, '').replace(/^[-\s]+/, '').trim();
                let d = new Date(cleanStr);
                if (!isNaN(d.getTime())) {
                    d.setFullYear(currentYear);
                    return d;
                }

                let fallbackDate = new Date(createdAt || Date.now());
                fallbackDate.setFullYear(currentYear);
                return fallbackDate;
            };

            const getSortValue = (dateStr, createdAt) => {
                return getRecordDateObj(dateStr, createdAt).getTime();
            };

            const sortedRecords = [...records].sort((a, b) => getSortValue(b.date, b.createdAt) - getSortValue(a.date, a.createdAt));

            const availableMonths = [...new Set(records.map(r => {
                const d = getRecordDateObj(r.date, r.createdAt);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            }))].sort().reverse();
            
            const currentYYYYMM = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
            if (!availableMonths.includes(currentYYYYMM)) {
                availableMonths.unshift(currentYYYYMM);
                availableMonths.sort().reverse();
            }

            const availableWeeks = [...new Set(records.map(r => {
                const d = getRecordDateObj(r.date, r.createdAt);
                return getLocalYYYYMMDD(getStartOfWeek(d));
            }))].sort().reverse();

            const currentWeekStr = getLocalYYYYMMDD(getStartOfWeek(new Date()));
            if (!availableWeeks.includes(currentWeekStr)) {
                availableWeeks.unshift(currentWeekStr);
                availableWeeks.sort().reverse();
            }

            const filteredRecords = sortedRecords.filter(r => {
                const d = getRecordDateObj(r.date, r.createdAt);
                const now = new Date();

                let timeMatch = true;
                if (timeFilterType === 'month') {
                    const recordMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    timeMatch = selectedMonth ? recordMonth === selectedMonth : true;
                } else if (timeFilterType === 'week') {
                    if (selectedWeek) {
                        const recordWeekStart = getLocalYYYYMMDD(getStartOfWeek(d));
                        timeMatch = recordWeekStart === selectedWeek;
                    } else {
                        const recordMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                        timeMatch = selectedMonth ? recordMonth === selectedMonth : true;
                    }
                } else if (timeFilterType === 'year') {
                    timeMatch = d.getFullYear() === now.getFullYear();
                }

                let userMatch = true;
                // 🌟 อัปเดตเงื่อนไขให้ครอบคลุม approver1 ด้วย
                if ((loggedInUser.role === 'admin' || loggedInUser.role === 'approver2' || loggedInUser.role === 'approver1') && selectedUserFilter) {
                    const filteredUserObj = APP_USERS[selectedUserFilter];
                    userMatch = filteredUserObj ? isUserMatch(r.responsible, filteredUserObj) : false;
                }

                let teamMatch = true;
                if ((loggedInUser.role === 'admin' || loggedInUser.role === 'approver2') && adminTeamFilter) {
                    const recordTeam = getTeamFromResponsible(r.responsible);
                    if (adminTeamFilter === 'All Corrective') {
                        teamMatch = recordTeam.startsWith('Corrective');
                    } else {
                        teamMatch = recordTeam === adminTeamFilter;
                    }
                }

                let jobTypeMatch = true;
                // 🌟 อัปเดตเงื่อนไขให้ครอบคลุม approver1 ด้วย
                if ((loggedInUser.role === 'admin' || loggedInUser.role === 'approver2' || loggedInUser.role === 'approver1') && adminJobTypeFilter) {
                    jobTypeMatch = r.jobType?.includes(adminJobTypeFilter);
                }

                return timeMatch && userMatch && teamMatch && jobTypeMatch;
            });

            const historyRecords = filteredRecords.filter(r => {
                if (loggedInUser.role === 'admin' || loggedInUser.role === 'approver2') return true;
                return isUserMatch(r.responsible, loggedInUser);
            });

            const shortCount = filteredRecords.filter(r => r.jobType?.includes('Short')).length;
            const mediumCount = filteredRecords.filter(r => r.jobType?.includes('Medium')).length;
            const longCount = filteredRecords.filter(r => r.jobType?.includes('Long')).length;
            const surveyCount = filteredRecords.filter(r => r.jobType?.includes('Survey')).length;
            const correctiveCount = filteredRecords.filter(r => r.jobType?.includes('Corrective')).length;
            const preventiveCount = filteredRecords.filter(r => r.jobType?.includes('Preventive')).length;

            const stats = {
                totalJobs: filteredRecords.length,
                shortPeriod: shortCount,
                mediumPeriod: mediumCount,
                longPeriod: longCount,
                surveyCount: surveyCount,
                correctiveCount: correctiveCount,
                preventiveCount: preventiveCount,
                totalCost: (shortCount * 440) + (mediumCount * 660) + (longCount * 880) + (surveyCount * 330) + (correctiveCount * 440) + (preventiveCount * 440) 
            };

            const handleSaveRecord = async (newRecord) => {
                setShowForm(false);
                setEditingRecord(null);
                setActiveTab('history');
                
                const nowIso = new Date().toISOString();
                
                if (editingRecord) {
                    const recordToSave = { 
                        ...newRecord, 
                        status: newRecord.status || 'draft',
                        updatedAt: nowIso 
                    };
                    
                    setRecords(prev => prev.map(r => r.id === editingRecord.id ? recordToSave : r));
                    setAllRecords(prev => prev.map(r => r.id === editingRecord.id ? recordToSave : r));

                    if (user && dbStatus !== 'local_only') {
                        setDbStatus('connecting'); 
                        try {
                            const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', editingRecord.id);
                            await updateDoc(docRef, recordToSave);
                            setDbStatus('connected');
                        } catch (err) {
                            console.error("Firebase Save Error:", err);
                            setDbStatus('local_only');
                            alert("⚠️ Offline mode active: Could not connect to Cloud. Data saved locally for now.");
                        }
                    }
                } 
                else {
                    let rawArray = newRecord.responsible.split(',').map(name => name.trim()).filter(name => name !== '');
                    if (rawArray.length === 0) rawArray = [loggedInUser.displayName]; 
                    
                    const namesToCreate = [...new Set(rawArray)]; 
                    
                    const sharedInterruptionId = (newRecord.interruptionId && newRecord.interruptionId !== '-') 
                        ? newRecord.interruptionId 
                        : ('AUTO-' + Math.floor(Math.random() * 1000000));

                    const newRecordsToSave = namesToCreate.map((personName, idx) => ({
                        ...newRecord,
                        id: Date.now().toString() + '_' + Math.floor(Math.random() * 10000) + '_' + idx,
                        interruptionId: sharedInterruptionId,
                        responsible: personName,

                        createdAt: nowIso

                    const myNewRecords = newRecordsToSave.filter(r => {
                        if (loggedInUser.role === 'admin' || loggedInUser.role === 'approver2') return true;
                        return isUserMatch(r.responsible, loggedInUser);

                    setRecords(prev => [...myNewRecords, ...prev]);
                    setAllRecords(prev => [...newRecordsToSave, ...prev]);

                    if (user && dbStatus !== 'local_only') {
                        setDbStatus('connecting'); 
                        try {
                            for (const rec of newRecordsToSave) {
                                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', rec.id);
                                await setDoc(docRef, rec);
                            }
                            setDbStatus('connected');
                        } catch (err) {
                            console.error("Firebase Save Error:", err);
                            setDbStatus('local_only');
                            alert("⚠️ Error saving data to the Cloud.");

            const handleEditRecord = (record) => {
                setEditingRecord(record);
                setShowForm(true);

            const requestDelete = (id) => {
                setRecordToDelete(id);
            };

            const executeDelete = async () => {
                if (!recordToDelete) return;
                const id = recordToDelete;
                
                if (dbStatus === 'local_only' || !user) {
                    setRecords(records.filter(r => r.id !== id));
                    setRecordToDelete(null);
                    return;
                }

                setDbStatus('connecting');
                try {
                    const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', id);
                    await deleteDoc(docRef);
                    setDbStatus('connected');
                } catch (err) {
                    setDbStatus('local_only');
                }
                setRecordToDelete(null);
            };

            const handleBatchStatusUpdate = async (recordsToUpdate, newStatus, reason = '') => {
                if (recordsToUpdate.length === 0) return;
                setIsBatchUpdating(true);

                if (!user || dbStatus === 'local_only') {
                    const idsToUpdate = recordsToUpdate.map(r => r.id);
                    const updateLocalData = (r) => {
                        if (idsToUpdate.includes(r.id)) {
                            const updated = { ...r, status: newStatus, updatedAt: new Date().toISOString() };
                            if (reason) updated.rejectReason = reason;
                            if (newStatus === 'pending_1' || newStatus === 'pending_2' || newStatus === 'completed') {
                                updated.rejectReason = '';
                            }
                            if (newStatus === 'completed') {
                                updated.approvedBy = loggedInUser.displayName;
                                updated.approveDate = new Date().toISOString();
                            } else if (newStatus === 'rejected') {
                                updated.rejectedBy = loggedInUser.displayName;
                                updated.rejectDate = new Date().toISOString();
                            }
                            return updated;
                        }
                        return r;
                    };
                    
                    setRecords(records.map(updateLocalData));
                    setAllRecords(allRecords.map(updateLocalData));
                    setIsBatchUpdating(false);
                    return;
                }

                try {
                    for (const r of recordsToUpdate) {
                        const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', r.id);
                        const updateData = { status: newStatus, updatedAt: new Date().toISOString() };
                        
                        if (reason) updateData.rejectReason = reason;
                        if (newStatus === 'pending_1' || newStatus === 'pending_2' || newStatus === 'completed') {
                            updateData.rejectReason = ''; 
                        }
                        
                        if (newStatus === 'completed') {
                            updateData.approvedBy = loggedInUser.displayName;
                            updateData.approveDate = new Date().toISOString();
                        } else if (newStatus === 'rejected') {
                            updateData.rejectedBy = loggedInUser.displayName;
                            updateData.rejectDate = new Date().toISOString();
                        }
                        
                        await updateDoc(docRef, updateData);
                    }
                } catch (err) {
                    alert("Error updating data. Please try again.");
                } finally {
                    setIsBatchUpdating(false);
                }
            };

            const showApprovalMenu = loggedInUser.role === 'admin' || loggedInUser.role === 'approver1' || loggedInUser.role === 'approver2';

            let pendingApprovalCount = 0;
            if (showApprovalMenu) {
                const pendingGroups = new Set();
                allRecords.forEach(r => {

                        shouldSee = r.status === 'pending_1' || r.status === 'pending_2';
                    } else if (loggedInUser.role === 'approver2') {
                        shouldSee = r.status === 'pending_2';
                    } else if (loggedInUser.role === 'approver1') {
                        const recordTeam = getTeamFromResponsible(r.responsible);
                        const isSelf = isUserMatch(r.responsible, loggedInUser);
                        if (recordTeam === loggedInUser.approveTeam && r.status === 'pending_1' && !isSelf) {
                            shouldSee = true;
                        }
                    }
                    if (shouldSee) {
                        const d = getRecordDateObj(r.date, r.createdAt);
                        const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                        
                        let standardizedName = r.responsible;
                        const matchedUsers = [];
                        for (const key in APP_USERS) {
                            const u = APP_USERS[key];
                            if (u.role !== 'admin' && u.role !== 'approver2' && isUserMatch(r.responsible, u)) {
                                matchedUsers.push(u.displayName);
                            }
                        }

                        if (matchedUsers.length > 0) {
                            standardizedName = matchedUsers.sort().join(', ');
                        }

                        pendingGroups.add(`${standardizedName}_${monthKey}`);
                    }
                });
                pendingApprovalCount = pendingGroups.size;
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-900">
                <aside className="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 text-slate-800 p-6 sticky top-0 h-screen">
                    <div className="flex items-center gap-3 mb-10 px-2">
                    <div className="bg-orange-500 p-2 rounded-lg text-white shadow-md shadow-orange-500/20">
                        <Clock size={24} />
                    </div>
                    <div>
                        <h1 className="text-xl font-black tracking-tight text-slate-900">OT Tracker</h1>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{loggedInUser.role === 'admin' ? 'Admin Panel' : (loggedInUser.role.includes('approver') ? 'Approver Panel' : 'User Panel')}</p>
                    </div>
                    </div>
                    
                    <nav className="space-y-2 flex-1">
                    <NavItem active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={<LayoutDashboard size={20} />} label="Dashboard" />
                    <NavItem active={activeTab === 'history'} onClick={() => setActiveTab('history')} icon={<History size={20} />} label="My History" />
                    {showApprovalMenu && (
                        <NavItem active={activeTab === 'approvals'} onClick={() => setActiveTab('approvals')} icon={<CheckSquare size={20} />} label="Pending Approvals" badgeCount={pendingApprovalCount} />
                    )}
                    <NavItem active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} icon={<FileText size={20} />} label="Export Reports" />
                    </nav>

                    <div className="mt-auto pt-6 border-t border-slate-100 space-y-3">
                    <button 
                        onClick={() => { setEditingRecord(null); setShowForm(true); }}
                        className="w-full flex items-center justify-center gap-2 bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl transition-all shadow-lg shadow-orange-500/30 font-bold"
                    >
                        <Plus size={20} />
                        <span>New OT Record</span>
                    </button>
                    </div>
                </aside>

                <main className="flex-1 overflow-y-auto pb-20 md:pb-0">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
                    <h2 className="text-lg font-bold text-slate-800">
                        {activeTab === 'dashboard' && 'Dashboard Overview'}
                        {activeTab === 'history' && 'My OT History'}

                    <div className="flex items-center gap-4 text-slate-600">

                                    <HardDrive size={10} />
                                    Offline
                                </span>

                        <div className="flex items-center gap-3">

                                <div className="text-sm font-bold text-slate-800 leading-tight">{loggedInUser.displayName}</div>
                                <div className="text-[10px] font-medium text-slate-400 capitalize">{loggedInUser.team} Team</div>

                    {activeTab === 'reports' && (

                            selectedWeek={selectedWeek}
                            timeFilterType={timeFilterType}
                            allRecords={allRecords}
                            loggedInUser={loggedInUser}
                        />
                    )}
                    </div>
                </main>

                <nav className="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center p-3 z-20">
                    <MobileNavItem active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={<LayoutDashboard size={20} />} label="Home" />
                    <MobileNavItem active={activeTab === 'history'} onClick={() => setActiveTab('history')} icon={<History size={20} />} label="History" />
                    <div className="relative -top-6">
                    <button 
                        onClick={() => { setEditingRecord(null); setShowForm(true); }}
                        className="bg-orange-500 text-white p-4 rounded-full shadow-lg shadow-orange-500/30 border-4 border-slate-50"

                    )}
                    <MobileNavItem active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} icon={<FileText size={20} />} label="Export" />

                {showForm && (
                    <OTForm

                {showChangePassword && (

                {recordToDelete && (

                        <div className="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-5 border-[6px] border-white shadow-sm">
                        <Trash2 size={36} />
                        </div>

                        <p className="text-sm text-slate-500 mb-8 font-medium px-4">This record will be permanently deleted.</p>
                        <div className="flex gap-3">
                        <button 
                            onClick={() => setRecordToDelete(null)}
                            className="flex-1 px-4 py-3.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors"

                        <button

                        >

        }

        function LoginScreen({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [isLoggingIn, setIsLoggingIn] = useState(false);
            const [isPasswordVisible, setIsPasswordVisible] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoggingIn(true);
                
                const userKey = username.trim().toLowerCase();
                const defaultUser = APP_USERS[userKey];

                if (!defaultUser) {
                setError('Invalid username');
                setIsLoggingIn(false);
                return;
                }

                try {
                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'user_credentials', userKey);
                const docSnap = await getDoc(docRef);
                
                let currentPassword = defaultUser.pass; 
                if (docSnap.exists()) {
                    currentPassword = docSnap.data().password; 
                }

                if (password === currentPassword) {
                    onLogin({ username: userKey, ...defaultUser, currentPass: currentPassword });
                } else {
                    setError('Invalid password');
                }
                } catch (err) {
                if (password === defaultUser.pass) {
                    onLogin({ username: userKey, ...defaultUser, currentPass: defaultUser.pass });
                } else {
                    setError('Invalid password (or System Offline)');
                }
                }
                
                setIsLoggingIn(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4">
                <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl border border-slate-100 p-8 sm:p-10 animate-in fade-in zoom-in-95 duration-500">

        function ChangePasswordModal({ user, onClose, onSuccess }) {
            const [oldPass, setOldPass] = useState('');
            const [newPass, setNewPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const [error, setError] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');

                if (oldPass !== user.currentPass) {
                    setError('Current password is incorrect');
                    return;
                }
                if (newPass.length < 6) {
                    setError('New password must be at least 6 characters');
                    return;
                }
                if (newPass !== confirmPass) {
                    setError('Passwords do not match');
                    return;
                }
                if (newPass === oldPass) {
                    setError('New password cannot be the same as current');
                    return;
                }

                setIsSaving(true);
                try {
                    const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'user_credentials', user.username);
                    await setDoc(docRef, { password: newPass, updatedAt: new Date().toISOString() }, { merge: true });
                    
                    onSuccess({ ...user, currentPass: newPass });
                } catch (err) {
                    setError('Error saving new password. Try again.');
                }
                setIsSaving(false);
            };

            return (
                <div className="fixed inset-0 z-[80] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 border border-slate-200 animate-in zoom-in-95 duration-200">
                        <div className="flex items-center justify-between mb-6">

                                    <Key size={20} />
                                </div>
                                <h3 className="text-xl font-bold text-slate-800">Change Password</h3>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full transition-colors">
                                <X size={16} />
                            </button>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            {error && (
                                <div className="bg-red-50 text-red-600 text-xs font-bold p-3 rounded-xl border border-red-100 text-center">
                                    {error}
                                </div>
                            )}
                            
                            <div className="space-y-1.5">
                                <label className="text-xs font-bold text-slate-500 uppercase">Current Password</label>
                                <input 
                                    type="password" 
                                    required
                                    className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors text-sm font-medium"
                                    value={oldPass}
                                    onChange={e => setOldPass(e.target.value)}
                                />
                            </div>
                            
                            <div className="space-y-1.5 pt-2">
                                <label className="text-xs font-bold text-slate-500 uppercase">New Password (Min. 6 chars)</label>
                                <input 
                                    type="password" 
                                    required
                                    className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors text-sm font-medium"
                                    value={newPass}
                                    onChange={e => setNewPass(e.target.value)}
                                />
                            </div>

                            <div className="space-y-1.5">
                                <label className="text-xs font-bold text-slate-500 uppercase">Confirm New Password</label>
                                <input 
                                    type="password" 
                                    required
                                    className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors text-sm font-medium"
                                    value={confirmPass}
                                    onChange={e => setConfirmPass(e.target.value)}
                                />
                            </div>

                            <button 
                                type="submit"
                                disabled={isSaving}
                                className="w-full py-3.5 bg-orange-500 text-white rounded-xl font-bold hover:bg-orange-600 shadow-lg shadow-orange-500/30 transition-all mt-6 flex justify-center items-center gap-2 disabled:bg-slate-300"
                            >
                                {isSaving ? <Loader2 size={18} className="animate-spin" /> : 'Save Password'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        function Dashboard({ stats, recentRecords, onSetTab, dbStatus, loggedInUser, allRecords, getRecordDateObj, getTeamFromResponsible }) {
            
            const isAdminOrApprover2 = loggedInUser?.role === 'admin' || loggedInUser?.role === 'approver2';
            const [isCleaning, setIsCleaning] = useState(false); 

            // 🌟 คำนวณประมาณการพื้นที่ที่ใช้ไป (Estimated Size)
            const estimatedDatabaseSizeMB = React.useMemo(() => {
                if (!allRecords || allRecords.length === 0) return 0;
                try {
                    const jsonString = JSON.stringify(allRecords);
                    // คำนวณขนาดเป็น bytes (ตัวอักษรละประมาณ 1 byte สำหรับภาษาอังกฤษ, แต่อาจจะถึง 3-4 bytes สำหรับภาษาไทย/Base64)
                    // เราใช้การประมาณจากความยาว string โดยเผื่อ overhead เล็กน้อย
                    const sizeInBytes = new Blob([jsonString]).size; 
                    const sizeInMB = sizeInBytes / (1024 * 1024);
                    return sizeInMB.toFixed(2);
                } catch (e) {
                    console.error("Error calculating size:", e);
                    return 0;
                }
            }, [allRecords]);

            // คำนวณเปอร์เซ็นต์การใช้งาน (โควต้าฟรี 1GB = 1024MB)
            const quotaLimitMB = 1024;
            const usagePercentage = ((estimatedDatabaseSizeMB / quotaLimitMB) * 100).toFixed(2);

            const handleCleanupOldData = async () => {
                const cutoffDate = new Date();
                cutoffDate.setMonth(cutoffDate.getMonth() - 18);

                const recordsToDelete = allRecords.filter(r => {
                    const recordDate = new Date(r.createdAt || r.date);
                    return recordDate < cutoffDate;
                });

                if (recordsToDelete.length === 0) {
                    alert("No old records found.\n(ไม่มีข้อมูลที่อายุเกิน 1 ปี 6 เดือนในระบบครับ)");
                    return;
                }

                const confirmMsg = `⚠️ DATABASE MAINTENANCE ⚠️\n\nFound ${recordsToDelete.length} records older than 18 months.\nAre you sure you want to permanently delete them to free up space?\n(พบข้อมูลเก่าจำนวน ${recordsToDelete.length} รายการ ยืนยันที่จะลบทิ้งเพื่อคืนพื้นที่ให้ระบบหรือไม่? การกระทำนี้ไม่สามารถกู้คืนได้)`;
                
                if (!window.confirm(confirmMsg)) return;

                setIsCleaning(true);
                let successCount = 0;
                let failCount = 0;

                for (const record of recordsToDelete) {
                    try {
                        const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', record.id);
                        await deleteDoc(docRef);
                        successCount++;
                    } catch (err) {
                        console.error("Failed to delete record:", record.id, err);
                        failCount++;
                    }
                }

                setIsCleaning(false);
                alert(`✅ Cleanup Complete!\nSuccessfully deleted: ${successCount} records.\nFailed: ${failCount}\n\n(ล้างข้อมูลเก่าเรียบร้อย คืนพื้นที่ให้ Firebase แล้วครับ)`);
            };

            const monthlyChartData = React.useMemo(() => {
                if (!isAdminOrApprover2 || !allRecords || allRecords.length === 0) return [];
                
                const currentYear = new Date().getFullYear();
                const monthsMap = {};
                
                for(let i = 1; i <= 12; i++) {
                    const mStr = String(i).padStart(2, '0');
                    const key = `${currentYear}-${mStr}`;
                    const d = new Date(currentYear, i - 1, 1);
                    monthsMap[key] = {
                        key: key,
                        label: d.toLocaleDateString('en-US', { month: 'short' }),
                        interruption: 0,
                        interruptionCost: 0,
                        corrective: 0,
                        correctiveCost: 0
                    };
                }

                allRecords.forEach(r => {
                    const d = getRecordDateObj(r.date, r.createdAt);
                    
                    if (d.getFullYear() !== currentYear) return; 

                    const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    if (!monthsMap[monthKey]) return; 

                    let cost = 0;
                    if (r.jobType?.includes('Short')) cost = 440;
                    else if (r.jobType?.includes('Medium')) cost = 660;
                    else if (r.jobType?.includes('Long')) cost = 880;
                    else if (r.jobType?.includes('Survey')) cost = 330;
                    else if (r.jobType?.includes('Corrective')) cost = 440;
                    else if (r.jobType?.includes('Preventive')) cost = 440;

                    const team = getTeamFromResponsible(r.responsible);
                    if (team === 'Interruption') {
                        monthsMap[monthKey].interruption += 1;
                        monthsMap[monthKey].interruptionCost += cost;
                    } else if (team && team.startsWith('Corrective')) {
                        monthsMap[monthKey].corrective += 1;
                        monthsMap[monthKey].correctiveCost += cost;
                    }
                });

                return Object.values(monthsMap).sort((a, b) => a.key.localeCompare(b.key));
            }, [allRecords, getRecordDateObj, getTeamFromResponsible, isAdminOrApprover2]);

            const maxChartValue = Math.max(...monthlyChartData.map(d => Math.max(d.interruption, d.corrective)), 1);

            const totalInterruptionCost = monthlyChartData.reduce((sum, data) => sum + data.interruptionCost, 0);
            const totalCorrectiveCost = monthlyChartData.reduce((sum, data) => sum + data.correctiveCost, 0);
            const grandTotalChartCost = totalInterruptionCost + totalCorrectiveCost;

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                
                <div className="bg-gradient-to-r from-emerald-500 to-teal-600 rounded-2xl p-6 md:p-8 text-white shadow-xl shadow-emerald-500/20 flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div>

                        <div className="flex items-baseline gap-2">

                        </div>
                    </div>

                        <Banknote size={40} className="text-white" />
                    </div>
                </div>

                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                    <StatCard label="Total Jobs" value={stats.totalJobs} color="orange" icon={<FileText size={20} />} />
                    <StatCard label="Short (440.-)" value={stats.shortPeriod} color="green" icon={<Clock size={20} />} />
                    <StatCard label="Medium (660.-)" value={stats.mediumPeriod} color="blue" icon={<Clock size={20} />} />
                    <StatCard label="Long (880.-)" value={stats.longPeriod} color="purple" icon={<Clock size={20} />} />
                    
                    <StatCard label="Survey (330.-)" value={stats.surveyCount} color="teal" icon={<ClipboardCheck size={20} />} />
                    <StatCard label="Corrective (440.-)" value={stats.correctiveCount} color="rose" icon={<Wrench size={20} />} />
                    <StatCard label="Preventive (440.-)" value={stats.preventiveCount} color="indigo" icon={<ShieldCheck size={20} />} />
                </div>

                {isAdminOrApprover2 && monthlyChartData.length > 0 && (
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mt-6 overflow-hidden">
                        <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                            <BarChart2 size={24} className="text-blue-500" />
                            Jobs & Cost Comparison (Year {new Date().getFullYear()})
                        </h3>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="bg-orange-50 rounded-xl p-4 border border-orange-100 flex flex-col justify-center">
                                <div className="text-xs text-orange-500 font-bold mb-1 uppercase tracking-wider">Interruption Team Total</div>
                                <div className="text-2xl font-black text-orange-600">฿{totalInterruptionCost.toLocaleString()}</div>
                            </div>
                            <div className="bg-blue-50 rounded-xl p-4 border border-blue-100 flex flex-col justify-center">
                                <div className="text-xs text-blue-500 font-bold mb-1 uppercase tracking-wider">Corrective Team Total</div>
                                <div className="text-2xl font-black text-blue-600">฿{totalCorrectiveCost.toLocaleString()}</div>
                            </div>
                            <div className="bg-emerald-50 rounded-xl p-4 border border-emerald-100 flex flex-col justify-center">
                                <div className="text-xs text-emerald-600 font-bold mb-1 uppercase tracking-wider">Grand Total</div>
                                <div className="text-2xl font-black text-emerald-600">฿{grandTotalChartCost.toLocaleString()}</div>
                            </div>
                        </div>

                        <div className="flex items-end gap-1 sm:gap-3 h-56 sm:h-64 px-1 sm:px-4 overflow-x-auto pb-2">
                            {monthlyChartData.map((data, idx) => {
                                const intHeight = (data.interruption / maxChartValue) * 100;
                                const corHeight = (data.corrective / maxChartValue) * 100;

                                return (
                                    <div key={idx} className="flex flex-col items-center min-w-[50px] flex-1 h-full justify-end group pt-10">
                                        <div className="flex gap-0.5 sm:gap-1.5 items-end w-full justify-center h-full">
                                            <div 
                                                className="w-1/2 max-w-[35px] bg-orange-400 rounded-t-md relative flex items-end justify-center transition-all hover:bg-orange-500 hover:opacity-90" 
                                                style={{ height: `${intHeight}%`, minHeight: data.interruption > 0 ? '4px' : '0' }}
                                                title={`Interruption: ${data.interruption} Jobs (฿${data.interruptionCost.toLocaleString()})`}
                                            >
                                                {data.interruption > 0 && (
                                                    <div className="absolute bottom-full mb-1.5 flex flex-col items-center leading-none">
                                                        <span className="text-xs font-bold text-orange-600">{data.interruption}</span>
                                                        <span className="text-[9px] text-orange-500/80 font-bold mt-0.5">฿{data.interruptionCost.toLocaleString()}</span>
                                                    </div>
                                                )}
                                            </div>
                                            <div 
                                                className="w-1/2 max-w-[35px] bg-blue-500 rounded-t-md relative flex items-end justify-center transition-all hover:bg-blue-600 hover:opacity-90" 
                                                style={{ height: `${corHeight}%`, minHeight: data.corrective > 0 ? '4px' : '0' }}
                                                title={`Corrective: ${data.corrective} Jobs (฿${data.correctiveCost.toLocaleString()})`}
                                            >
                                                {data.corrective > 0 && (
                                                    <div className="absolute bottom-full mb-1.5 flex flex-col items-center leading-none">
                                                        <span className="text-xs font-bold text-blue-600">{data.corrective}</span>
                                                        <span className="text-[9px] text-blue-500/80 font-bold mt-0.5">฿{data.correctiveCost.toLocaleString()}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <span className="text-[10px] sm:text-xs font-bold text-slate-500 mt-3 truncate w-full text-center">{data.label}</span>
                                    </div>
                                )
                            })}
                        </div>
                        <div className="flex justify-center gap-6 mt-4 pt-4 border-t border-slate-100">
                            <div className="flex items-center gap-2 text-xs font-bold text-slate-600">
                                <div className="w-3 h-3 rounded bg-orange-400"></div> Interruption Team
                            </div>
                            <div className="flex items-center gap-2 text-xs font-bold text-slate-600">
                                <div className="w-3 h-3 rounded bg-blue-500"></div> Corrective Team
                            </div>
                        </div>
                    </div>
                )}

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div className="lg:col-span-2 space-y-4">
                    <div className="flex items-center justify-between">
                        <h3 className="text-lg font-bold text-slate-800">Recent Records</h3>
                        <button onClick={() => onSetTab('history')} className="text-orange-500 text-sm font-bold hover:underline flex items-center gap-1">
                        View All <ChevronRight size={16} />
                        </button>
                    </div>
                    <div className="space-y-3">
                        {recentRecords.length > 0 ? (
                        recentRecords.map(record => (
                            <div key={record.id} className="bg-white p-4 rounded-xl border border-slate-200 flex items-center justify-between shadow-sm hover:border-orange-200 transition-colors">
                            <div className="flex items-center gap-4">
                                <div className={`p-3 rounded-lg ${
                                record.jobType?.includes('Long') ? 'bg-purple-50 text-purple-600' : 'bg-orange-50 text-orange-500'
                                }`}>
                                <FileText size={24} />
                                </div>
                                <div>
                                <h4 className="font-bold text-slate-800 line-clamp-1">{record.interruption}</h4>
                                <p className="text-xs text-slate-500 flex items-center gap-1 mt-1 font-medium">
                                    <MapPin size={12} /> {record.location} | {record.date}
                                </p>
                                </div>
                            </div>
                            <div className="hidden sm:block text-right">
                                <span className="px-2 py-1 rounded-full bg-slate-50 text-[10px] font-bold text-slate-600 border border-slate-100 uppercase">
                                {record.jobType}
                                </span>
                            </div>
                            </div>
                        ))
                        ) : (
                        <div className="bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-12 text-center text-slate-400 font-medium">
                            No records found.
                        </div>
                        )}
                    </div>
                    </div>

                    <div className="flex flex-col gap-4">
                        <div className="bg-gradient-to-br from-orange-500 to-orange-600 rounded-2xl p-6 text-white flex flex-col justify-between shadow-xl shadow-orange-500/20 flex-1">
                            <div>
                                <h3 className="text-xl font-bold mb-2">Cloud Sync Status</h3>
                                {dbStatus === 'local_only' ? (
                                <div className="bg-white/10 p-3 rounded-xl mt-3 border border-orange-300/50">
                                    <p className="text-xs font-bold text-white uppercase tracking-wider mb-1 flex items-center gap-1"><HardDrive size={12}/> Local Storage Mode</p>
                                    <p className="text-xs text-orange-50 opacity-90 leading-relaxed">

                                </div>
                                ) : (
                                <p className="text-orange-100 text-sm opacity-90 leading-relaxed font-medium">
                                    System is synced with Firebase. Ready for cross-device usage and LINE Bot integration.
                                </p>
                                )}
                            </div>
                            <div className="mt-6 flex gap-2">

                        {loggedInUser?.role === 'admin' && (
                            <div className="bg-red-50 border border-red-200 rounded-2xl p-6 flex flex-col justify-between shadow-sm">
                                <div>
                                    <h3 className="text-red-800 font-bold mb-1 flex items-center gap-2"><Trash2 size={18}/> Database Maintenance</h3>
                                    
                                    {/* 🌟 แสดงข้อมูลพื้นที่เก็บข้อมูล */}
                                    <div className="bg-white rounded-xl p-3 my-3 border border-red-100">

                                            <span className="font-black text-red-600">{estimatedDatabaseSizeMB} MB / 1,024 MB</span>

                                        <div className="text-[10px] text-right text-slate-400 font-medium">Usage: {usagePercentage}% of Free Quota</div>

                                    <p className="text-red-600 text-[11px] font-medium opacity-90 leading-relaxed mb-4">
                                        Clear old records (> 18 months) to free up the 1GB Firebase limit.
                                    </p>

        function StatCard({ label, value, color, icon }) {

                orange: 'bg-orange-50 text-orange-500',
                green: 'bg-emerald-50 text-emerald-500',
                blue: 'bg-blue-50 text-blue-500',
