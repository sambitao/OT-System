        // 🌟 Helper Functions
        const formatMonth = (YYYYMM) => {
            if (!YYYYMM) return 'ทั้งหมด';
            const [year, month] = YYYYMM.split('-');
            const date = new Date(year, month - 1);
            return date.toLocaleDateString('th-TH', { month: 'long', year: 'numeric' });
        };

        const getStartOfWeek = (date) => {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(d.setHours(0,0,0,0)).setDate(diff);
        };
        const getEndOfWeek = (date) => {
            const d = new Date(getStartOfWeek(date));
            return new Date(d.setDate(d.getDate() + 6)).setHours(23,59,59,999);
        };
        const getLocalYYYYMMDD = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };
        const formatWeekLabel = (startDateStr) => {
            if (!startDateStr) return 'ทั้งหมด';
            const start = new Date(startDateStr);
            const end = new Date(getEndOfWeek(start));
            const formatOpt = { day: 'numeric', month: 'short' };
            const formatOptYear = { day: 'numeric', month: 'short', year: 'numeric' };
            return `${start.toLocaleDateString('th-TH', formatOpt)} - ${end.toLocaleDateString('th-TH', formatOptYear)}`;
        };

        // 🌟 แก้ไข: ฟังก์ชันแปลง URL รูปภาพของ Google Drive ให้แสดงผลได้บนเว็บ
        const getDisplayImageUrl = (url) => {
            if (!url) return '';
            try {
                // ถ้าเป็น URL ของ Google Drive แบบเก่า
                if (url.includes('drive.google.com') && url.includes('id=')) {
                    const urlObj = new URL(url);
                    const fileId = urlObj.searchParams.get('id');
                    // ใช้ URL โครงสร้างใหม่ที่เสถียรกว่า (lh3.googleusercontent.com/d/...)
                    if (fileId) {
                        return `https://lh3.googleusercontent.com/d/${fileId}`;
                    }
                }
                // ถ้าเป็น URL รูปแบบอื่นของ Google Drive
                else if (url.includes('drive.google.com/file/d/')) {
                    const fileId = url.split('/d/')[1].split('/')[0];
                    if (fileId) {
                        return `https://lh3.googleusercontent.com/d/${fileId}`;
                    }
                }
            } catch(e) {
                console.error("Error formatting image URL:", e);
            }
            return url;
        };

        const isUserMatch = (recordResponsible, userObj) => {
            if (!recordResponsible || !userObj) return false;
            const resLower = recordResponsible.toLowerCase().trim();
            const filterLower = userObj.filterName.toLowerCase().trim();
            const displayLower = userObj.displayName.toLowerCase().trim();
            
            // 1. เช็คแบบตรงกันทั้งชื่อและนามสกุลก่อน (Exact or full includes)
            if (resLower.includes(filterLower) || resLower.includes(displayLower) || (filterLower === 'test' && resLower === 'test')) {
                return true;
            }
            
            // เช็คใน aliases แบบเต็มชื่อ
            if (userObj.aliases && Array.isArray(userObj.aliases)) {
                for (const alias of userObj.aliases) {
                    if (resLower.includes(alias.toLowerCase().trim())) {
                        return true;
                    }
                }
            }
            
            // 2. ถ้าในฐานข้อมูล "มีการใส่นามสกุลมาด้วย (มีจุด .)" แต่ไม่ผ่านเงื่อนไขด้านบน
            // แสดงว่าเป็นคนชื่อซ้ำแต่นามสกุลต่างกัน -> ให้ return false ทันที
            if (resLower.includes('.')) {
                return false;
            }
            
            // 3. ถ้าฐานข้อมูลมี "แค่ชื่อหน้า (ไม่มีจุด)" ให้เทียบเฉพาะชื่อหน้า
            const filterFirstName = filterLower.split('.')[0];
            const displayFirstName = displayLower.split('.')[0];
            
            if (resLower.includes(filterFirstName) || resLower.includes(displayFirstName)) {
                return true;
            }
            
            if (userObj.aliases && Array.isArray(userObj.aliases)) {
                for (const alias of userObj.aliases) {
                    const aliasFirstName = alias.toLowerCase().split('.')[0].trim();
                    if (resLower.includes(aliasFirstName)) {
                        return true;
                    }
                }
            }
            
            return false;
        };

            const [activeTab, setActiveTab] = useState('dashboard');
            const [records, setRecords] = useState([]);
            const [allRecords, setAllRecords] = useState([]);
            const [showForm, setShowForm] = useState(false);
            const [editingRecord, setEditingRecord] = useState(null);
            
            // 🌟 แก้ไข: กลับมาใช้ค่าเริ่มต้นเป็น 'month' และแสดงเดือนปัจจุบัน
            const [timeFilterType, setTimeFilterType] = useState('month'); 
            const [selectedMonth, setSelectedMonth] = useState(() => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            }); 
            const [selectedWeek, setSelectedWeek] = useState(() => getLocalYYYYMMDD(getStartOfWeek(new Date())));
            const [selectedUserFilter, setSelectedUserFilter] = useState('');
            const [adminTeamFilter, setAdminTeamFilter] = useState('');
            const [adminJobTypeFilter, setAdminJobTypeFilter] = useState('');
            
            const [recordToDelete, setRecordToDelete] = useState(null); 
            const [showChangePassword, setShowChangePassword] = useState(false); 
            const [isBatchUpdating, setIsBatchUpdating] = useState(false);
            
            const [user, setUser] = useState(null);
            const [dbStatus, setDbStatus] = useState('connecting');

            const handleLogin = (userData) => {
                setLoggedInUser(userData);
                localStorage.setItem('ot_user', JSON.stringify(userData));
            };

            const handleLogout = () => {
                setLoggedInUser(null);
                localStorage.removeItem('ot_user');
                setRecords([]);
                setAllRecords([]);
            };

            useEffect(() => {
                const initAuth = async () => {
                try {
                    await signInAnonymously(auth);
                } catch (err) {
                    setDbStatus('local_only'); 
                }
                };
                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                setUser(currentUser);
                if(currentUser && dbStatus !== 'local_only') {
                    setDbStatus('connected');
                }
                });

                return () => unsubscribeAuth();
            }, []);

            useEffect(() => {
                if (!user || dbStatus === 'local_only' || !loggedInUser) return;

                const recordsRef = collection(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records');
                
                const unsubscribeData = onSnapshot(recordsRef, (snapshot) => {
                    let data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setAllRecords(data);
                    
                    // Filter สำหรับดึงเข้า State หลัก (Dashboard)
                    if (loggedInUser.role === 'user') {
                        // 🌟 ใช้ฟังก์ชัน isUserMatch ที่รองรับ aliases
                        data = data.filter(r => isUserMatch(r.responsible, loggedInUser));
                    } else if (loggedInUser.role === 'approver1') {
                        // approver1 ดูงานตัวเอง และดูของลูกทีมได้ใน Dashboard
                        data = data.filter(r => {
                            const isSelf = isUserMatch(r.responsible, loggedInUser);
                            const isTeam = getTeamFromResponsible(r.responsible) === loggedInUser.approveTeam;
                            return isSelf || isTeam;
                        });
                    }
                    // admin และ approver2 ดูได้หมดทุกงาน
                    
                    setRecords(data);
                    setDbStatus('connected');
                }, (error) => {
                    setDbStatus('local_only');
                });

                return () => unsubscribeData();
            }, [user, dbStatus, loggedInUser]);

            if (!loggedInUser) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            const getRecordDateObj = (dateStr, createdAt) => {
                const currentYear = new Date().getFullYear();

                if (!dateStr) {
                    let d = new Date(createdAt || Date.now());
                    d.setFullYear(currentYear);
                    return d;
                }
                
                let s = String(dateStr).toLowerCase();
                let day = 1;

                const dayMatch = s.match(/\b([1-9]|[12]\d|3[01])\b/);
                if (dayMatch) {
                    day = parseInt(dayMatch[1]);
                }

                const monthKeywords = {
                    0: ['jan', 'ม.ค.', 'มกราคม'], 1: ['feb', 'ก.พ.', 'กุมภาพันธ์'],
                    2: ['mar', 'มี.ค.', 'มีนาคม'], 3: ['apr', 'เม.ย.', 'เมษายน'],
                    4: ['may', 'พ.ค.', 'พฤษภาคม'], 5: ['jun', 'มิ.ย.', 'มิถุนายน'],
                    6: ['jul', 'ก.ค.', 'กรกฎาคม'], 7: ['aug', 'ส.ค.', 'สิงหาคม'],
                    8: ['sep', 'ก.ย.', 'กันยายน'], 9: ['oct', 'ต.ค.', 'ตุลาคม'],
                    10: ['nov', 'พ.ย.', 'พฤศจิกายน'], 11: ['dec', 'ธ.ค.', 'ธันวาคม']
                };

                for (const [monthIdx, keywords] of Object.entries(monthKeywords)) {
                    if (keywords.some(kw => s.includes(kw))) {
                        return new Date(currentYear, parseInt(monthIdx), day);
                    }
                }

                const slashMatch = s.match(/(?:^|[^\d])(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})(?:[^\d]|$)/);
                if (slashMatch) {
                    const d = parseInt(slashMatch[1]);
                    const m = parseInt(slashMatch[2]) - 1;
                    if (m >= 0 && m <= 11) {
                        return new Date(currentYear, m, d);
                    }
                }

                let cleanStr = s.replace(/^(date|วันที่)[\s:]*/i, '').replace(/^[-\s]+/, '').trim();
                let d = new Date(cleanStr);
                if (!isNaN(d.getTime())) {
                    d.setFullYear(currentYear);
                    return d;
                }

                let fallbackDate = new Date(createdAt || Date.now());
                fallbackDate.setFullYear(currentYear);
                return fallbackDate;
            };

            const getSortValue = (dateStr, createdAt) => {
                return getRecordDateObj(dateStr, createdAt).getTime();
            };

            const sortedRecords = [...records].sort((a, b) => getSortValue(b.date, b.createdAt) - getSortValue(a.date, a.createdAt));

            const availableMonths = [...new Set(records.map(r => {
                const d = getRecordDateObj(r.date, r.createdAt);
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            }))].sort().reverse();
            
            const currentYYYYMM = `${new Date().getFullYear()}-${String(new Date().getMonth() + 1).padStart(2, '0')}`;
            if (!availableMonths.includes(currentYYYYMM)) {
                availableMonths.unshift(currentYYYYMM);
                availableMonths.sort().reverse();
            }

            const availableWeeks = [...new Set(records.map(r => {
                const d = getRecordDateObj(r.date, r.createdAt);
                return getLocalYYYYMMDD(getStartOfWeek(d));
            }))].sort().reverse();

            const currentWeekStr = getLocalYYYYMMDD(getStartOfWeek(new Date()));
            if (!availableWeeks.includes(currentWeekStr)) {
                availableWeeks.unshift(currentWeekStr);
                availableWeeks.sort().reverse();
            }

            const filteredRecords = sortedRecords.filter(r => {
                const d = getRecordDateObj(r.date, r.createdAt);
                const now = new Date();

                // 1. Time Filter
                let timeMatch = true;
                if (timeFilterType === 'month') {
                    const recordMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    timeMatch = selectedMonth ? recordMonth === selectedMonth : true;
                } else if (timeFilterType === 'week') {
                    if (selectedWeek) {
                        const recordWeekStart = getLocalYYYYMMDD(getStartOfWeek(d));
                        timeMatch = recordWeekStart === selectedWeek;
                    } else {
                        const recordMonth = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                        timeMatch = selectedMonth ? recordMonth === selectedMonth : true;
                    }
                } else if (timeFilterType === 'year') {
                    timeMatch = d.getFullYear() === now.getFullYear();
                }

                // 2. User Filter (อัปเดตให้รองรับ Aliases)
                let userMatch = true;
                if ((loggedInUser.role === 'admin' || loggedInUser.role === 'approver2') && selectedUserFilter) {
                    const filteredUserObj = APP_USERS[selectedUserFilter];
                    userMatch = filteredUserObj ? isUserMatch(r.responsible, filteredUserObj) : false;
                }

                // 3. Team Filter (Admin)
                let teamMatch = true;
                if ((loggedInUser.role === 'admin' || loggedInUser.role === 'approver2') && adminTeamFilter) {
                    const recordTeam = getTeamFromResponsible(r.responsible);
                    if (adminTeamFilter === 'All Corrective') {
                        teamMatch = recordTeam.startsWith('Corrective');
                    } else {
                        teamMatch = recordTeam === adminTeamFilter;
                    }
                }

                // 4. Job Type Filter (Admin)
                let jobTypeMatch = true;
                if ((loggedInUser.role === 'admin' || loggedInUser.role === 'approver2') && adminJobTypeFilter) {
                    jobTypeMatch = r.jobType?.includes(adminJobTypeFilter);
                }

                return timeMatch && userMatch && teamMatch && jobTypeMatch;
            });

            // 🌟 แยกประวัติงานสำหรับหน้า History ให้เห็นเฉพาะของตัวเอง ยกเว้น Admin และ Approver2 ให้ดูได้หมด
            const historyRecords = filteredRecords.filter(r => {
                if (loggedInUser.role === 'admin' || loggedInUser.role === 'approver2') return true;
                return isUserMatch(r.responsible, loggedInUser);
            });

            const shortCount = filteredRecords.filter(r => r.jobType?.includes('Short')).length;
            const mediumCount = filteredRecords.filter(r => r.jobType?.includes('Medium')).length;
            const longCount = filteredRecords.filter(r => r.jobType?.includes('Long')).length;
            const surveyCount = filteredRecords.filter(r => r.jobType?.includes('Survey')).length;
            const correctiveCount = filteredRecords.filter(r => r.jobType?.includes('Corrective')).length;
            const preventiveCount = filteredRecords.filter(r => r.jobType?.includes('Preventive')).length;

            const stats = {
                totalJobs: filteredRecords.length,
                shortPeriod: shortCount,
                mediumPeriod: mediumCount,
                longPeriod: longCount,
                surveyCount: surveyCount,
                correctiveCount: correctiveCount,
                preventiveCount: preventiveCount,
                totalCost: (shortCount * 440) + (mediumCount * 660) + (longCount * 880) + (surveyCount * 330) + (correctiveCount * 440) + (preventiveCount * 440) 
            };

            const handleSaveRecord = async (newRecord) => {
                setShowForm(false);
                setEditingRecord(null);
                setActiveTab('history');
                
                const nowIso = new Date().toISOString();
                
                // 1. กรณี: แก้ไขข้อมูลเดิม (Edit) -> เซฟทับข้อมูลก้อนเดียว
                if (editingRecord) {
                    const recordToSave = { 
                        ...newRecord, 
                        status: newRecord.status || 'draft',
                        updatedAt: nowIso 
                    };
                    
                    // Optimistic update
                    setRecords(prev => prev.map(r => r.id === editingRecord.id ? recordToSave : r));
                    setAllRecords(prev => prev.map(r => r.id === editingRecord.id ? recordToSave : r));

                    if (user && dbStatus !== 'local_only') {
                        setDbStatus('connecting'); 
                        try {
                            const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', editingRecord.id);
                            await updateDoc(docRef, recordToSave);
                            setDbStatus('connected');
                        } catch (err) {
                            console.error("Firebase Save Error:", err);
                            setDbStatus('local_only');
                            alert("⚠️ ไม่สามารถบันทึกข้อมูลลง Cloud ได้ (อาจเกิดจากอินเทอร์เน็ตขัดข้อง หรือสิทธิ์ Firebase ถูกบล็อก)\n\nระบบได้ทำการบันทึกข้อมูลแบบ Offline ไว้ในหน้าจอให้ชั่วคราวแล้วครับ");
                        }
                    }
                } 
                // 2. กรณี: สร้างงานใหม่ (Create) -> ทำการแยกร่าง (Auto-Split) ให้แต่ละคน
                else {
                    // ดึงชื่อทุกคนที่พิมพ์มาแยกด้วยลูกน้ำ (,)
                    let rawArray = newRecord.responsible.split(',').map(name => name.trim()).filter(name => name !== '');
                    if (rawArray.length === 0) rawArray = [loggedInUser.displayName]; // ถ้าลืมใส่ชื่อ ให้ใช้ชื่อคนล็อกอิน
                    
                    const namesToCreate = [...new Set(rawArray)]; // ลบชื่อที่ซ้ำกัน
                    
                    // สร้าง ID งานร่วมกัน เพื่อให้ระบบรู้ว่าเป็นงานเดียวกัน
                    const sharedInterruptionId = (newRecord.interruptionId && newRecord.interruptionId !== '-') 
                        ? newRecord.interruptionId 
                        : ('AUTO-' + Math.floor(Math.random() * 1000000));

                    // สร้างข้อมูลบิลของแต่ละคน
                    const newRecordsToSave = namesToCreate.map((personName, idx) => ({
                        ...newRecord,
                        id: Date.now().toString() + '_' + Math.floor(Math.random() * 10000) + '_' + idx,
                        interruptionId: sharedInterruptionId,
                        responsible: personName, // แยกชื่อเป็นของใครของมัน
                        status: 'draft',
                        createdAt: nowIso
                    }));

                    // คัดเลือกเฉพาะบิลของคุณมาโชว์ในหน้าจอทันที (ส่วนของเพื่อนจะไปโชว์ที่หน้าจอเพื่อน)
                    const myNewRecords = newRecordsToSave.filter(r => {
                        if (loggedInUser.role === 'admin' || loggedInUser.role === 'approver2') return true;
                        return isUserMatch(r.responsible, loggedInUser);
                    });

                    setRecords(prev => [...myNewRecords, ...prev]);
                    setAllRecords(prev => [...newRecordsToSave, ...prev]);

                    if (user && dbStatus !== 'local_only') {
                        setDbStatus('connecting'); 
                        try {
                            for (const rec of newRecordsToSave) {
                                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', rec.id);
                                await setDoc(docRef, rec);
                            }
                            setDbStatus('connected');
                        } catch (err) {
                            console.error("Firebase Save Error:", err);
                            setDbStatus('local_only');
                            alert("⚠️ เกิดข้อผิดพลาดในการบันทึกข้อมูลลง Cloud");
                        }
                    }
                }
            };

            const handleEditRecord = (record) => {
                setEditingRecord(record);
                setShowForm(true);
            };

            const requestDelete = (id) => {
                setRecordToDelete(id);
            };

            const executeDelete = async () => {
                if (!recordToDelete) return;
                const id = recordToDelete;
                
                if (dbStatus === 'local_only' || !user) {
                    setRecords(records.filter(r => r.id !== id));
                    setRecordToDelete(null);
                    return;
                }

                setDbStatus('connecting');
                try {
                    const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', id);
                    await deleteDoc(docRef);
                    setDbStatus('connected');
                } catch (err) {
                    setDbStatus('local_only');
                }
                setRecordToDelete(null);
            };

            // 🌟 ฟังก์ชันอัปเดตสถานะแบบกลุ่ม (Submit, Approve, Reject)
            const handleBatchStatusUpdate = async (recordsToUpdate, newStatus, reason = '') => {
                if (recordsToUpdate.length === 0) return;
                setIsBatchUpdating(true);

                // 🌟 เพิ่ม Fallback สำหรับโหมด Offline / จำลอง (Local Only) ให้แสดงผลได้ทันทีโดยไม่ต้องรอฐานข้อมูล
                if (!user || dbStatus === 'local_only') {
                    const idsToUpdate = recordsToUpdate.map(r => r.id);
                    const updateLocalData = (r) => {
                        if (idsToUpdate.includes(r.id)) {
                            const updated = { ...r, status: newStatus, updatedAt: new Date().toISOString() };
                            if (reason) updated.rejectReason = reason;
                            if (newStatus === 'pending_1' || newStatus === 'pending_2' || newStatus === 'completed') {
                                updated.rejectReason = '';
                            }
                            if (newStatus === 'completed') {
                                updated.approvedBy = loggedInUser.displayName;
                                updated.approveDate = new Date().toISOString();
                            } else if (newStatus === 'rejected') {
                                updated.rejectedBy = loggedInUser.displayName;
                                updated.rejectDate = new Date().toISOString();
                            }
                            return updated;
                        }
                        return r;
                    };
                    
                    setRecords(records.map(updateLocalData));
                    setAllRecords(allRecords.map(updateLocalData));
                    setIsBatchUpdating(false);
                    return;
                }

                try {
                    for (const r of recordsToUpdate) {
                        const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'ot_records', r.id);
                        const updateData = { status: newStatus, updatedAt: new Date().toISOString() };
                        
                        if (reason) updateData.rejectReason = reason;
                        if (newStatus === 'pending_1' || newStatus === 'pending_2' || newStatus === 'completed') {
                            updateData.rejectReason = ''; // เคลียร์เหตุผลเมื่อมีการส่งใหม่หรือผ่านการอนุมัติ
                        }
                        
                        if (newStatus === 'completed') {
                            updateData.approvedBy = loggedInUser.displayName;
                            updateData.approveDate = new Date().toISOString();
                        } else if (newStatus === 'rejected') {
                            updateData.rejectedBy = loggedInUser.displayName;
                            updateData.rejectDate = new Date().toISOString();
                        }
                        
                        await updateDoc(docRef, updateData);
                    }
                } catch (err) {
                    alert("เกิดข้อผิดพลาดในการปรับปรุงข้อมูล กรุณาลองใหม่");
                } finally {
                    setIsBatchUpdating(false);
                }
            };

            // เมนูด้านข้าง จะแสดงเมนู "รอการอนุมัติ" ก็ต่อเมื่อมีสิทธิ์เป็น admin, approver1 หรือ approver2
            const showApprovalMenu = loggedInUser.role === 'admin' || loggedInUser.role === 'approver1' || loggedInUser.role === 'approver2';

            // 🌟 คำนวณจำนวนงานที่รออนุมัติ (นับเป็นกลุ่ม/แฟ้ม) เพื่อแสดงเป็น Badge
            let pendingApprovalCount = 0;
            if (showApprovalMenu) {
                const pendingGroups = new Set();
                allRecords.forEach(r => {
                    let shouldSee = false;
                    if (loggedInUser.role === 'admin') {
                        shouldSee = r.status === 'pending_1' || r.status === 'pending_2';
                    } else if (loggedInUser.role === 'approver2') {
                        shouldSee = r.status === 'pending_2';
                    } else if (loggedInUser.role === 'approver1') {
                        const recordTeam = getTeamFromResponsible(r.responsible);
                        const isSelf = isUserMatch(r.responsible, loggedInUser);
                        if (recordTeam === loggedInUser.approveTeam && r.status === 'pending_1' && !isSelf) {
                            shouldSee = true;
                        }
                    }
                    if (shouldSee) {
                        const d = getRecordDateObj(r.date, r.createdAt);
                        const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                        pendingGroups.add(`${r.responsible}_${monthKey}`);
                    }
                });
                pendingApprovalCount = pendingGroups.size;
            }

            return (
                <div className="min-h-screen bg-slate-50 flex flex-col md:flex-row font-sans text-slate-900">
                <aside className="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 text-slate-800 p-6 sticky top-0 h-screen">
                    <div className="flex items-center gap-3 mb-10 px-2">
                    <div className="bg-orange-500 p-2 rounded-lg text-white shadow-md shadow-orange-500/20">
                        <Clock size={24} />
                    </div>
                    <div>
                        <h1 className="text-xl font-black tracking-tight text-slate-900">OT Tracker</h1>
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{loggedInUser.role === 'admin' ? 'Admin Panel' : (loggedInUser.role.includes('approver') ? 'Approver Panel' : 'User Panel')}</p>
                    </div>
                    </div>
                    
                    <nav className="space-y-2 flex-1">
                    <NavItem active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} icon={<LayoutDashboard size={20} />} label="ภาพรวม Dashboard" />
                    <NavItem active={activeTab === 'history'} onClick={() => setActiveTab('history')} icon={<History size={20} />} label="ประวัติการบันทึกของฉัน" />
                    {showApprovalMenu && (
                        <NavItem active={activeTab === 'approvals'} onClick={() => setActiveTab('approvals')} icon={<CheckSquare size={20} />} label="รายการรออนุมัติ" badgeCount={pendingApprovalCount} />
                    )}
                    <NavItem active={activeTab === 'reports'} onClick={() => setActiveTab('reports')} icon={<FileText size={20} />} label="สรุปรายงาน (Export)" />
                    </nav>

                    <div className="mt-auto pt-6 border-t border-slate-100 space-y-3">
                    <button 
                        onClick={() => { setEditingRecord(null); setShowForm(true); }}
                        className="w-full flex items-center justify-center gap-2 bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-xl transition-all shadow-lg shadow-orange-500/30 font-bold"
                    >
                        <Plus size={20} />
                        <span>บันทึก OT ใหม่</span>
                    </button>
                    </div>
                </aside>

                <main className="flex-1 overflow-y-auto pb-20 md:pb-0">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between sticky top-0 z-10">
                    <h2 className="text-lg font-bold text-slate-800">
                        {activeTab === 'dashboard' && 'ภาพรวมระบบ'}
                        {activeTab === 'history' && 'ประวัติการทำงานของคุณ'}
                        {activeTab === 'approvals' && 'รายการรออนุมัติ (Approval Center)'}
                        {activeTab === 'reports' && 'ส่งออกรายงาน (Export)'}
                    </h2>
                    
                    <div className="flex items-center gap-4 text-slate-600">
                        <div className="hidden md:flex items-center">
                            {dbStatus === 'connected' ? (
                                <span className="flex items-center gap-1.5 text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full border border-emerald-100">
                                    <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                    Online
                                </span>
                            ) : (
                                <span className="flex items-center gap-1.5 text-[10px] font-bold text-slate-600 bg-slate-100 px-2.5 py-1 rounded-full border border-slate-200">
                                    <HardDrive size={10} />
                                    Offline
                                </span>
                            )}
                        </div>
                        
                        <div className="w-px h-6 bg-slate-200 mx-1 hidden md:block"></div>
                        
                        <div className="flex items-center gap-3">
                            <div className="text-right hidden sm:block">
                                <div className="text-sm font-bold text-slate-800 leading-tight">{loggedInUser.displayName}</div>
                                <div className="text-[10px] font-medium text-slate-400 capitalize">{loggedInUser.team} Team</div>
                            </div>
                            <div className="w-9 h-9 rounded-full bg-orange-100 border border-orange-200 flex items-center justify-center text-orange-600 font-bold">
                                {loggedInUser.displayName.charAt(0)}
                            </div>
                            <button 
                            onClick={() => setShowChangePassword(true)}
                            title="เปลี่ยนรหัสผ่าน"

        function LoginScreen({ onLogin }) {

            const [isLoggingIn, setIsLoggingIn] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsLoggingIn(true);
                
                const userKey = username.trim().toLowerCase();
                const defaultUser = APP_USERS[userKey];

                if (!defaultUser) {
                setError('ชื่อผู้ใช้งานไม่ถูกต้อง');
                setIsLoggingIn(false);
                return;
                }

                try {
                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'user_credentials', userKey);
                const docSnap = await getDoc(docRef);
                
                let currentPassword = defaultUser.pass; 
                if (docSnap.exists()) {
                    currentPassword = docSnap.data().password; 
                }

                if (password === currentPassword) {
                    onLogin({ username: userKey, ...defaultUser, currentPass: currentPassword });
                } else {
                    setError('รหัสผ่านไม่ถูกต้อง');
                }
                } catch (err) {
                if (password === defaultUser.pass) {
                    onLogin({ username: userKey, ...defaultUser, currentPass: defaultUser.pass });
                } else {
                    setError('รหัสผ่านไม่ถูกต้อง (หรือระบบ Offline)');
                }
                }
                
                setIsLoggingIn(false);
            };

        function ChangePasswordModal({ user, onClose, onSuccess }) {
            const [oldPass, setOldPass] = useState('');
            const [newPass, setNewPass] = useState('');
            const [confirmPass, setConfirmPass] = useState('');
            const [error, setError] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');

                if (oldPass !== user.currentPass) {
                    setError('รหัสผ่านเดิมไม่ถูกต้อง');
                    return;
                }
                if (newPass.length < 6) {
                    setError('รหัสผ่านใหม่ต้องมีอย่างน้อย 6 ตัวอักษร');
                    return;
                }
                if (newPass !== confirmPass) {
                    setError('รหัสผ่านใหม่และการยืนยันรหัสไม่ตรงกัน');
                    return;
                }
                if (newPass === oldPass) {
                    setError('รหัสผ่านใหม่ต้องไม่ซ้ำกับรหัสผ่านเดิม');
                    return;
                }

                setIsSaving(true);
                try {
                    const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'user_credentials', user.username);
                    await setDoc(docRef, { password: newPass, updatedAt: new Date().toISOString() }, { merge: true });
                    
                    onSuccess({ ...user, currentPass: newPass });
                } catch (err) {
                    setError('เกิดข้อผิดพลาดในการบันทึก กรุณาลองใหม่');
                }
                setIsSaving(false);
            };

            return (
                <div className="fixed inset-0 z-[80] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 border border-slate-200 animate-in zoom-in-95 duration-200">
                        <div className="flex items-center justify-between mb-6">

                                    <Key size={20} />
                                </div>

                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 bg-slate-100 p-2 rounded-full transition-colors">
                                <X size={16} />
                            </button>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            {error && (
                                <div className="bg-red-50 text-red-600 text-xs font-bold p-3 rounded-xl border border-red-100 text-center">
                                    {error}
                                </div>
                            )}
                            
                            <div className="space-y-1.5">
                                <label className="text-xs font-bold text-slate-500 uppercase">รหัสผ่านปัจจุบัน</label>
                                <input 
                                    type="password" 
                                    required
                                    className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors text-sm font-medium"
                                    value={oldPass}
                                    onChange={e => setOldPass(e.target.value)}
                                />
                            </div>
                            
                            <div className="space-y-1.5 pt-2">
                                <label className="text-xs font-bold text-slate-500 uppercase">รหัสผ่านใหม่ (6 ตัวอักษรขึ้นไป)</label>
                                <input 
                                    type="password" 
                                    required
                                    className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 focus:bg-white focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-colors text-sm font-medium"
                                    value={newPass}
                                    onChange={e => setNewPass(e.target.value)}
                                />
                            </div>

                            <div className="space-y-1.5">
                                <label className="text-xs font-bold text-slate-500 uppercase">ยืนยันรหัสผ่านใหม่</label>
                                <input

                                    value={confirmPass}
                                    onChange={e => setConfirmPass(e.target.value)}
                                />
                            </div>

                            <button 
                                type="submit"
                                disabled={isSaving}
                                className="w-full py-3.5 bg-orange-500 text-white rounded-xl font-bold hover:bg-orange-600 shadow-lg shadow-orange-500/30 transition-all mt-6 flex justify-center items-center gap-2 disabled:bg-slate-300"
                            >
                                {isSaving ? <Loader2 size={18} className="animate-spin" /> : 'บันทึกรหัสผ่านใหม่'}
                            </button>
                        </form>
                    </div>
                </div>
            );

            const colors = {
                orange: 'bg-orange-50 text-orange-500',
                green: 'bg-emerald-50 text-emerald-500',
                blue: 'bg-blue-50 text-blue-500',
                purple: 'bg-purple-50 text-purple-500',
                teal: 'bg-teal-50 text-teal-600',
                rose: 'bg-rose-50 text-rose-500',
                indigo: 'bg-indigo-50 text-indigo-500',
            };
            return (
                <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between h-32 relative overflow-hidden">
                <div className={`w-10 h-10 rounded-xl ${colors[color] || colors.orange} flex items-center justify-center relative z-10`}>
                    {icon}
                </div>
                <div className="relative z-10">
                    <div className="text-2xl font-black text-slate-800">{value}</div>
                    <div className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-1">{label}</div>
                </div>
                </div>
            );
        }

        // 🌟 Helper เพื่อจัดสไตล์ให้ป้าย Status
        function StatusBadge({ status, rejectReason, responsibleName }) {
            let approverName = "หัวหน้า";
            if (responsibleName) {
                const team = getTeamFromResponsible(responsibleName);
                const approver = Object.values(APP_USERS).find(u => u.role === 'approver1' && u.approveTeam === team);
                if (approver) {
                    approverName = approver.displayName;
                }
            }

            if (status === 'pending_1') return <span className="inline-flex items-center gap-1 text-amber-600 bg-amber-50 px-2 py-0.5 rounded text-[10px] font-bold border border-amber-200"><Clock size={10} /> รออนุมัติ ({approverName})</span>;
            if (status === 'pending_2') return <span className="inline-flex items-center gap-1 text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-[10px] font-bold border border-blue-200"><Clock size={10} /> รออนุมัติ (Teerapong)</span>;
            if (status === 'completed') return <span className="inline-flex items-center gap-1 text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded text-[10px] font-bold border border-emerald-200"><CheckCircle2 size={10} /> อนุมัติแล้ว</span>;
            if (status === 'rejected') return <span className="inline-flex items-center gap-1 text-red-600 bg-red-50 px-2 py-0.5 rounded text-[10px] font-bold border border-red-200" title={rejectReason}><XCircle size={10} /> ถูกตีกลับ</span>;
            return <span className="inline-flex items-center gap-1 text-slate-500 bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold border border-slate-200">ร่าง (ยังไม่ส่ง)</span>;
        }

        function HistoryList({ records, onDelete, onEdit, allRecords, loggedInUser, selectedMonth, timeFilterType, onBatchUpdate, isBatchUpdating }) {
            const [showConfirmModal, setShowConfirmModal] = useState(false); // 🌟 เพิ่ม State สำหรับเปิด/ปิดป๊อปอัปยืนยัน

            // เช็คว่ามีงานของเดือนที่เลือก ซึ่งยังไม่ได้ส่ง หรือโดนตีกลับ ไหม
            const draftRecords = records.filter(r => !r.status || r.status === 'draft' || r.status === 'rejected');
            const canSubmit = timeFilterType === 'month' && selectedMonth && draftRecords.length > 0 && loggedInUser.role !== 'admin' && loggedInUser.role !== 'approver2';

            // 🌟 คำนวณจำนวนงานที่รูปยังไม่ครบ (ต้องมีทั้งก่อนและหลัง)
            const missingImagesCount = draftRecords.filter(r => !r.beforeImage || !r.afterImage).length;

            const handleSubmitOT = () => {
                if (missingImagesCount > 0) {
                    alert("ไม่สามารถส่งขออนุมัติได้: กรุณาอัปโหลดรูปภาพ (ก่อนทำและหลังทำ) ให้ครบทุกงานก่อนครับ");
                    return;
                }
                setShowConfirmModal(true); // 🌟 เปลี่ยนจากการใช้ confirm() มาเป็นการเปิดป๊อปอัป
            };

            const executeSubmitOT = async () => {
                setShowConfirmModal(false);
                const newStatus = loggedInUser.role === 'approver1' ? 'pending_2' : 'pending_1';
                await onBatchUpdate(draftRecords, newStatus);
                
                // 🌟 ระบบส่ง Email แจ้งเตือนเมื่อกดส่งขออนุมัติ
                try {
                    let targetEmail = '';
                    let approverName = '';
                    
                    if (newStatus === 'pending_1') {
                        // หา Approver 1 ประจำทีม
                        const approver = Object.values(APP_USERS).find(u => u.role === 'approver1' && u.approveTeam === loggedInUser.team);
                        targetEmail = approver?.email;
                        approverName = approver?.displayName;
                    } else if (newStatus === 'pending_2') {
                        // หา Approver 2 (teerapong.t)
                        const approver = Object.values(APP_USERS).find(u => u.role === 'approver2');
                        targetEmail = approver?.email;
                        approverName = approver?.displayName;
                    }

                    if (targetEmail) {
                        const monthLabel = formatMonth(selectedMonth);
                        const subject = `รบกวนพิจารณาค่าดำเนินการล่วงเวลา OT ประจำเดือน : ${monthLabel} ของ ${loggedInUser.displayName}`;
                        
                        // จัดเรียงรายละเอียดงานเบื้องต้น
                        const jobDetails = draftRecords.map((r, i) => `${i+1}. ${r.date} - ${r.location} - ${r.jobType.split('(')[0].trim()}`).join('\n');
                        
                        // 🌟 แก้ไขรูปแบบข้อความในอีเมลและเพิ่มส่วนท้าย
                        const body = `เรียนคุณ ${approverName || 'ผู้อนุมัติ'},\n\nมีการส่งคำขออนุมัติค่าดำเนินการล่วงเวลา (OT) ประจำเดือน ${monthLabel} จากคุณ ${loggedInUser.displayName}\n\nรายละเอียดงาน:\n${jobDetails}\n\nกรุณาเข้าสู่ระบบ OT Tracker เพื่อตรวจสอบรายละเอียดและดำเนินการอนุมัติ หรือตีกลับ\nlink เว็ป = https://sambitao.github.io/OT-System/\n\n(อีเมลฉบับนี้เป็นการแจ้งเตือนอัตโนมัติจากระบบ OT Tracker)`;

                        // ยิง Request ไปหา GAS เพื่อสั่งให้ส่ง Email
                        fetch(GAS_WEBHOOK_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'send_email', to: targetEmail, subject: subject, body: body }),
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                        }).catch(err => console.log("แจ้งเตือน: ไม่สามารถส่งอีเมลในโหมดจำลองได้", err));
                    }
                } catch (e) {
                    console.error("Email notification error:", e);
                }
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                <div className="flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center mb-2">
                    <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2"><History size={20} className="text-orange-500"/> ประวัติการบันทึกงาน</h3>
                    <div className="relative w-full sm:w-64">
                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                        <input 
                            type="text" 
                            placeholder="ค้นหางาน หรือ สถานที่..." 
                            className="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-all font-medium shadow-sm"
                        />
                    </div>
                </div>

                <div className="overflow-hidden bg-white border border-slate-200 rounded-2xl shadow-sm">
                    <div className="overflow-x-auto">
                    <table className="w-full text-left text-sm">
                        <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[10px] font-black tracking-widest">
                        <tr>
                            <th className="px-6 py-4">Job Info & Status</th>
                            <th className="px-6 py-4">Date & Time</th>
                            <th className="px-6 py-4">Responsible</th>
                            <th className="px-6 py-4 text-center">Images</th>
                            <th className="px-6 py-4 text-right">Action</th>
                        </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                        {records.map((record) => {
                            const hasBothImages = record.beforeImage && record.afterImage;
                            const hasOneImage = record.beforeImage || record.afterImage;

                            let displayResponsible = record.responsible;
                            if (allRecords && record.interruptionId && record.interruptionId !== '-') {
                                const coworkers = allRecords
                                    .filter(r => r.interruptionId === record.interruptionId)
                                    .map(r => r.responsible);
                                if (coworkers.length > 0) {
                                    displayResponsible = [...new Set(coworkers)].join(', ');
                                }
                            }

                            // กำหนดสิทธิ์ให้ลบแก้ได้เฉพาะงานตัวเองที่เป็นร่าง หรือถูกตีกลับ (Admin แก้ได้หมด)
                            const isDraftOrRejected = !record.status || record.status === 'draft' || record.status === 'rejected';
                            const isSelf = isUserMatch(record.responsible, loggedInUser);
                            const isAdmin = loggedInUser.role === 'admin';
                            const canEditDelete = isAdmin || (isSelf && isDraftOrRejected);

                            return (
                            <tr key={record.id} className="hover:bg-orange-50/50 transition-colors">
                                <td className="px-6 py-4">
                                <div className="font-bold text-slate-800 break-words whitespace-pre-wrap">{record.interruption}</div>
                                <div className="text-[10px] text-slate-500 flex items-center gap-2 mt-1.5 flex-wrap">
                                    <StatusBadge status={record.status} rejectReason={record.rejectReason} responsibleName={record.responsible} />
                                    <span className="px-1.5 py-0.5 bg-slate-100 border border-slate-200 rounded uppercase font-bold text-slate-600">{record.jobType?.split('(')[1]?.replace(')', '') || record.jobType}</span>
                                    <span className="font-medium">ID: {record.interruptionId || '-'}</span>
                                </div>
                                {record.status === 'rejected' && record.rejectReason && (
                                    <div className="mt-2 text-[10px] text-red-600 font-medium bg-red-50 p-1.5 rounded border border-red-100 flex gap-1">
                                        <MessageSquare size={12} className="shrink-0" />
                                        <span>หมายเหตุ: {record.rejectReason}</span>
                                    </div>
                                )}
                                </td>
                                <td className="px-6 py-4">
                                <div className="text-slate-700 font-bold">{record.date}</div>
                                <div className="text-xs text-slate-400 font-medium">{record.time}</div>
                                </td>
                                <td className="px-6 py-4">
                                <div className="flex items-start gap-2">
                                    <Users size={14} className="text-slate-400 mt-0.5 shrink-0" />
                                    <span className="text-slate-600 font-medium break-words">{displayResponsible}</span>
                                </div>
                                </td>
                                <td className="px-6 py-4 text-center">
                                {hasBothImages ? (
                                    <span className="inline-flex items-center gap-1 text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full text-[10px] font-bold border border-emerald-100">
                                    <CheckCircle2 size={10} /> รูปครบถ้วน
                                    </span>
                                ) : hasOneImage ? (
                                    <span className="inline-flex items-center gap-1 text-orange-600 bg-orange-50 px-2.5 py-1 rounded-full text-[10px] font-bold border border-orange-100">
                                    <ImageIcon size={10} /> ขาด 1 รูป
                                    </span>
                                ) : (
                                    <span className="inline-flex items-center gap-1 text-red-600 bg-red-50 px-2.5 py-1 rounded-full text-[10px] font-bold border border-red-100">
                                    <ImageIcon size={10} /> ยังไม่ใส่รูป
                                    </span>
                                )}
                                </td>
                                <td className="px-6 py-4 text-right">
                                <div className="flex justify-end gap-3">
                                    {canEditDelete ? (
                                        <>
                                            <button onClick={() => onEdit(record)} className="text-slate-400 hover:text-orange-500 transition-colors" title="อัปโหลดรูป / แก้ไขข้อมูล"><Edit size={18} /></button>
                                            <button onClick={() => onDelete(record.id)} className="text-slate-400 hover:text-red-500 transition-colors" title="ลบข้อมูล"><Trash2 size={18} /></button>
                                        </>
                                    ) : (
                                        <div className="text-[10px] text-slate-400 font-bold flex items-center gap-1 justify-end"><Lock size={12}/> ล็อก</div>
                                    )}
                                </div>
                                </td>
                            </tr>
                            );
                        })}
                        {records.length === 0 && (
                            <tr>
                            <td colSpan="5" className="px-6 py-12 text-center text-slate-400 italic font-medium">
                                ไม่พบรายการข้อมูลในบัญชี หรือถูกซ่อนไว้โดยตัวกรองเวลา (ลองปรับช่วงเวลาด้านบนเป็น "ทั้งหมด")
                            </td>
                            </tr>
                        )}
                        </tbody>
                    </table>
                    </div>
                </div>

                {/* 🌟 ปุ่มส่งอนุมัติรายเดือน */}
                {canSubmit && (
                    <div className="bg-blue-50 border border-blue-200 rounded-2xl p-6 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-sm animate-in fade-in zoom-in-95">
                        <div className="flex items-start gap-3 text-blue-800">
                            <Send size={24} className="mt-1" />
                            <div>
                                <h4 className="font-bold text-lg">เตรียมส่งขออนุมัติรายเดือน</h4>
                                <p className="text-sm opacity-80 font-medium">มีข้อมูล {draftRecords.length} รายการ ประจำเดือน {formatMonth(selectedMonth)} ที่พร้อมส่งให้หัวหน้าพิจารณา</p>
                                {missingImagesCount > 0 && (
                                    <p className="text-xs text-red-600 font-bold mt-2 flex items-center gap-1.5 bg-red-50/80 px-2.5 py-1.5 rounded-lg border border-red-200 w-fit">
                                        <XCircle size={14} /> ล็อกการส่ง: มี {missingImagesCount} งานที่ยังใส่รูปไม่ครบ 2 รูป
                                    </p>
                                )}
                            </div>
                        </div>
                        <button 
                            onClick={handleSubmitOT}
                            disabled={isBatchUpdating || missingImagesCount > 0}
                            className={`w-full sm:w-auto px-8 py-3.5 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 ${isBatchUpdating || missingImagesCount > 0 ? 'bg-slate-400 shadow-none cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-600/30'}`}
                        >
                            {isBatchUpdating ? <Loader2 size={18} className="animate-spin" /> : <Send size={18} />}
                            ส่งข้อมูลให้หัวหน้า
                        </button>
                    </div>
                )}

                {/* 🌟 ป๊อปอัปยืนยันการส่งขออนุมัติ */}
                {showConfirmModal && (
                    <div className="fixed inset-0 z-[70] flex items-center justify-center p-4">
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowConfirmModal(false)}></div>
                        <div className="relative bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 text-center border border-slate-200 animate-in zoom-in-95 duration-200">
                            <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-5 border-[6px] border-white shadow-sm">
                                <Send size={36} />
                            </div>
                            <h3 className="text-xl font-black text-slate-800 mb-2">ยืนยันการส่งขออนุมัติ?</h3>
                            <p className="text-sm text-slate-500 mb-8 font-medium px-4">
                                ประจำเดือน {formatMonth(selectedMonth)} (จำนวน {draftRecords.length} รายการ)<br/><br/>เมื่อส่งแล้วจะไม่สามารถแก้ไขข้อมูลได้จนกว่าจะถูกตีกลับ
                            </p>
                            <div className="flex gap-3">
                                <button onClick={() => setShowConfirmModal(false)} className="flex-1 px-4 py-3.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors">ยกเลิก</button>
                                <button onClick={executeSubmitOT} disabled={isBatchUpdating} className="flex-1 px-4 py-3.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all flex justify-center items-center gap-2 disabled:opacity-50">
                                    {isBatchUpdating ? <Loader2 size={18} className="animate-spin" /> : <><Send size={18} /> ยืนยันส่ง</>}
                                </button>
                            </div>
                        </div>
                    </div>
                )}
                </div>
            );
        }

        // 🌟 หน้ากระดานอนุมัติสำหรับ Approver
        function ApprovalDashboard({ allRecords, loggedInUser, onBatchUpdate, isBatchUpdating, getRecordDateObj, getSortValue, getTeamFromResponsible }) {
            const [rejectModalGroup, setRejectModalGroup] = useState(null);
            const [rejectReasonText, setRejectReasonText] = useState('');
            const [rejectError, setRejectError] = useState(''); // 🌟 เพิ่มแจ้งเตือนถ้าลืมใส่เหตุผลตีกลับ
            const [viewingGroup, setViewingGroup] = useState(null); 
            const [confirmApproveGroup, setConfirmApproveGroup] = useState(null); // 🌟 State สำหรับป๊อปอัปอนุมัติ

            // ดึงข้อมูลที่รออนุมัติทั้งหมด
            const getPendingGroups = () => {
                const groups = {};
                
                allRecords.forEach(r => {
                    let shouldSee = false;
                    
                    if (loggedInUser.role === 'admin') {
                        shouldSee = r.status === 'pending_1' || r.status === 'pending_2';
                    } else if (loggedInUser.role === 'approver2') {
                        shouldSee = r.status === 'pending_2';
                    } else if (loggedInUser.role === 'approver1') {
                        const recordTeam = getTeamFromResponsible(r.responsible);
                        const isSelf = isUserMatch(r.responsible, loggedInUser);
                        if (recordTeam === loggedInUser.approveTeam && r.status === 'pending_1' && !isSelf) {
                            shouldSee = true;
                        }
                    }

                    if (shouldSee) {
                        const d = getRecordDateObj(r.date, r.createdAt);
                        const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                        // ยึดตามชื่อพนักงาน และเดือน
                        const key = `${r.responsible}_${monthKey}`;
                        
                        if (!groups[key]) {
                            groups[key] = {
                                responsible: r.responsible,
                                month: monthKey,
                                status: r.status,
                                records: [],
                                totalCost: 0
                            };
                        }
                        
                        groups[key].records.push(r);
                        
                        // คำนวณยอดเงินคร่าวๆ เพื่อให้ Approver ดูง่ายๆ
                        if (r.jobType?.includes('Short')) groups[key].totalCost += 440;
                        else if (r.jobType?.includes('Medium')) groups[key].totalCost += 660;
                        else if (r.jobType?.includes('Long')) groups[key].totalCost += 880;
                        else if (r.jobType?.includes('Survey')) groups[key].totalCost += 330;
                        else if (r.jobType?.includes('Corrective')) groups[key].totalCost += 440;
                        else if (r.jobType?.includes('Preventive')) groups[key].totalCost += 440;
                    }
                });

                return Object.values(groups).sort((a, b) => b.month.localeCompare(a.month));
            };

            const groups = getPendingGroups();

            const handleApprove = (group) => {
                setConfirmApproveGroup(group); // 🌟 เปลี่ยนจาก confirm() มาเปิดป๊อปอัปแทน
            };

            const executeApprove = () => {
                if (!confirmApproveGroup) return;
                const newStatus = 'completed';
                onBatchUpdate(confirmApproveGroup.records, newStatus);
                setViewingGroup(null);
                setConfirmApproveGroup(null);
            };

            const confirmReject = (e) => {
                e.preventDefault();
                setRejectError('');
                if (!rejectReasonText.trim()) {
                    setRejectError('กรุณาระบุเหตุผลการตีกลับ');
                    return;
                }
                onBatchUpdate(rejectModalGroup.records, 'rejected', rejectReasonText);
                setRejectModalGroup(null);
                setRejectReasonText('');
                setViewingGroup(null); // ปิดหน้าต่างรายละเอียดถ้าเปิดอยู่
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <div className="flex items-center gap-3 mb-2">
                            <FolderOpen size={24} className="text-orange-500" />
                            <h3 className="font-bold text-slate-800 text-lg">แฟ้มงานรอการอนุมัติ</h3>
                        </div>
                        <p className="text-sm text-slate-500 font-medium">กรุณาตรวจสอบข้อมูลและรูปภาพก่อนกดอนุมัติ หากพบข้อผิดพลาดให้กดตีกลับเพื่อให้เจ้าหน้าที่แก้ไข</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {groups.map((g, idx) => (
                            <div key={idx} className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm hover:shadow-md hover:border-orange-200 transition-all flex flex-col justify-between">
                                <div>
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center font-bold text-lg">
                                                {g.responsible.charAt(0).toUpperCase()}
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-slate-800 leading-tight">{g.responsible}</h4>
                                                <div className="text-[10px] text-slate-400 font-medium uppercase tracking-wider">{getTeamFromResponsible(g.responsible)} Team</div>
                                            </div>
                                        </div>
                                        <StatusBadge status={g.status} responsibleName={g.responsible} />
                                    </div>
                                    
                                    <div className="bg-slate-50 rounded-xl p-3 mb-5 border border-slate-100 flex items-center justify-between">
                                        <div>

        function Reports({ records, getSortValue, selectedMonth, selectedWeek, timeFilterType, allRecords, loggedInUser }) {
            const [showPreview, setShowPreview] = useState(false);
            const [isExportingExcel, setIsExportingExcel] = useState(false);
            const [exportProgress, setExportProgress] = useState('');

            const handleExportExcel = async () => {
                setIsExportingExcel(true);
                setExportProgress('กำลังเตรียมระบบ...');
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const worksheet = workbook.addWorksheet('OT Report');
                    
                    worksheet.columns = [
                        { width: 5 },
                        { width: 20 },
                        { width: 45 },
                        { width: 25 },
                        { width: 25 }
                    ];

                    worksheet.mergeCells('A1:E1');
                    const titleCell = worksheet.getCell('A1');
                    
                    let reportTitleLabel = 'รายละเอียดปฏิบัติงานเบิกค่าล่วงเวลา (OT )';
                    if (timeFilterType === 'month' && selectedMonth) reportTitleLabel += ` ประจำเดือน ${formatMonth(selectedMonth)}`;
                    else if (timeFilterType === 'week') {
                        if (selectedWeek) reportTitleLabel += ` (สัปดาห์ ${formatWeekLabel(selectedWeek)})`;
                        else if (selectedMonth) reportTitleLabel += ` ประจำเดือน ${formatMonth(selectedMonth)}`;
                        else reportTitleLabel += ` (รายสัปดาห์)`;
                    }
                    else if (timeFilterType === 'year') reportTitleLabel += ` (ปีปัจจุบัน)`;
                    
                    titleCell.value = reportTitleLabel;
                    titleCell.font = { name: 'Tahoma', size: 14, bold: true };
                    titleCell.alignment = { vertical: 'middle', horizontal: 'left' };
                    
                    const fetchImageBase64 = async (url) => {
                        if (!url) return null;
                        if (url.startsWith('data:image')) return url; 
                        
                        try {
                            const urlObj = new URL(url);
                            const fileId = urlObj.searchParams.get('id');
                            if (!fileId) return null;

                            const response = await fetch(GAS_WEBHOOK_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'get_image', fileId: fileId }),
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                            });
                            const result = await response.json();
                            if (result.success) return result.base64;
                        } catch (e) {
                            console.error("Image proxy failed", e);
                        }
                        return null;
                    };

                    const allCompleted = records.length > 0 && records.every(r => r.status === 'completed');
                    let currentRow = 2;
                    
                    if (allCompleted) {
                        // 🌟 แก้ไข: ดึงวันที่อนุมัติและชื่อคนอนุมัติ จากการกดอนุมัติ "ครั้งล่าสุด (ล่าสุดที่เพิ่งทำ)"
                        const approvedRecords = [...records].filter(r => r.approveDate).sort((a, b) => new Date(b.approveDate).getTime() - new Date(a.approveDate).getTime());
                        const approverName = approvedRecords.length > 0 ? approvedRecords[0].approvedBy : '-';
                        const approveDateRaw = approvedRecords.length > 0 ? approvedRecords[0].approveDate : null;
                        const approveDate = approveDateRaw ? new Date(approveDateRaw).toLocaleString('th-TH') : '-';
                        
                        worksheet.addRow([`สถานะ: Approved | อนุมัติโดย: ${approverName} | วันที่: ${approveDate}`]);
                        worksheet.mergeCells('A2:E2');
                        worksheet.getCell('A2').font = { name: 'Tahoma', size: 11, bold: true, color: { argb: 'FF059669' } };
                        worksheet.getCell('A2').alignment = { vertical: 'middle', horizontal: 'left' };
                        currentRow = 3;
                    }

                    const sortedRecords = [...records].sort((a, b) => getSortValue(a.date, a.createdAt) - getSortValue(b.date, b.createdAt)); 
                    
                    for (let index = 0; index < sortedRecords.length; index++) {
                        const record = sortedRecords[index];
                        setExportProgress(`กำลังดึงรูปภาพ ${index + 1}/${sortedRecords.length}...`);
                        const i = index + 1;
                        
                        // 🌟 ค้นหารายชื่อผู้ร่วมงานสำหรับการ Export Excel
                        let displayResponsible = record.responsible;
                        if (allRecords && record.interruptionId && record.interruptionId !== '-') {
                            const coworkers = allRecords
                                .filter(r => r.interruptionId === record.interruptionId)
                                .map(r => r.responsible);
                            if (coworkers.length > 0) {
                                displayResponsible = [...new Set(coworkers)].join(', ');
                            }
                        }
                        
                        worksheet.addRow([i, 'JOB Type :', record.jobType, 'รูปก่อนทำ', 'รูปหลังทำ']);
                        worksheet.addRow(['', 'Interruption :', record.interruption, '', '']);
                        worksheet.addRow(['', 'Interruption ID :', record.interruptionId || '-', '', '']);
                        worksheet.addRow(['', 'Reason', record.reason || '-', '', '']);
                        worksheet.addRow(['', 'Location :', 'Location: ' + record.location, '', '']);
                        worksheet.addRow(['', 'Date :', 'Date: ' + record.date, '', '']);
                        worksheet.addRow(['', 'Time :', 'Time: ' + record.time, '', '']);
                        worksheet.addRow(['', 'NSB Responsible :', 'เจ้าหน้าที่ปฏิบัติงาน : ' + displayResponsible, '', '']);
                        
                        worksheet.mergeCells(`A${currentRow}:A${currentRow+7}`);
                        worksheet.mergeCells(`D${currentRow+1}:D${currentRow+7}`);
                        worksheet.mergeCells(`E${currentRow+1}:E${currentRow+7}`);
                        
                        for (let r = currentRow; r <= currentRow + 7; r++) {
                            const row = worksheet.getRow(r);
                            row.height = 18; 
                            row.eachCell({ includeEmpty: true }, (cell) => {
                                cell.font = { name: 'Tahoma', size: 10 };
                                cell.border = {
                                    top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'}
                                };
                                cell.alignment = { vertical: 'top', wrapText: true };
                            });
                        }
                        
                        worksheet.getCell(`A${currentRow}`).alignment = { vertical: 'middle', horizontal: 'center' };
                        worksheet.getCell(`A${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`B${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`C${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true, color: { argb: 'FFEA580C' } }; 
                        worksheet.getCell(`D${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`D${currentRow}`).alignment = { horizontal: 'center' };
                        worksheet.getCell(`E${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`E${currentRow}`).alignment = { horizontal: 'center' };
                        
                        const addImageToCell = async (imageUrl, colIndex0Based, currentR) => {
                            const base64String = await fetchImageBase64(imageUrl);
                            if (!base64String) return;
                            
                            const extMatch = base64String.match(/^data:image\/([a-zA-Z0-9]+);base64,/);
                            const ext = extMatch ? extMatch[1] : 'png';
                            const base64Data = base64String.replace(/^data:image\/[a-zA-Z0-9]+;base64,/, '');
                            const imgId = workbook.addImage({ base64: base64Data, extension: ext });
                            
                            worksheet.addImage(imgId, {
                                tl: { col: colIndex0Based, row: currentR }, 
                                br: { col: colIndex0Based + 1, row: currentR + 7 }, 
                                editAs: 'twoCell'
                            });
                        };

                        if (record.beforeImage) await addImageToCell(record.beforeImage, 3, currentRow);
                        if (record.afterImage) await addImageToCell(record.afterImage, 4, currentRow);
                        
                        currentRow += 8;
                        worksheet.addRow([]); 
                        currentRow += 1;
                    }
                    
                    setExportProgress('กำลังสร้างไฟล์ Excel...');
                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const link = document.createElement("a");
                    const url = URL.createObjectURL(blob);
                    link.setAttribute("href", url);
                    link.setAttribute("download", `OT_Report_${selectedMonth || 'All_Time'}_${new Date().getTime()}.xlsx`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    console.error("Excel generation error:", error);
                    alert('เกิดข้อผิดพลาดระหว่างดาวน์โหลดไฟล์ Excel');
                } finally {
                    setIsExportingExcel(false);
                    setExportProgress('');
                }
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                <div className="bg-white rounded-2xl border border-slate-200 p-8 text-center space-y-6 shadow-sm">
                    <div className="w-16 h-16 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto">
                    <TableProperties size={32} />
                    </div>
                    <div className="space-y-2">
