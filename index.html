        function StatusBadge({ status, rejectReason, responsibleName }) {
            let approverName = "Manager";
            if (responsibleName) {
                const team = getTeamFromResponsible(responsibleName);
                const approver = Object.values(APP_USERS).find(u => u.role === 'approver1' && u.approveTeam === team);
                
                if (approver && approver.displayName !== responsibleName) {
                    approverName = approver.displayName;
                } else if (approver && approver.displayName === responsibleName) {
                     approverName = "Teerapong"; 
                }
            }

            if (status === 'pending_1') return <span className="inline-flex items-center gap-1 text-amber-600 bg-amber-50 px-2 py-0.5 rounded text-[10px] font-bold border border-amber-200"><Clock size={10} /> Pending ({approverName})</span>;
            if (status === 'pending_2') return <span className="inline-flex items-center gap-1 text-blue-600 bg-blue-50 px-2 py-0.5 rounded text-[10px] font-bold border border-blue-200"><Clock size={10} /> Pending (Teerapong)</span>;
            if (status === 'completed') return <span className="inline-flex items-center gap-1 text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded text-[10px] font-bold border border-emerald-200"><CheckCircle2 size={10} /> Approved</span>;
            if (status === 'rejected') return <span className="inline-flex items-center gap-1 text-red-600 bg-red-50 px-2 py-0.5 rounded text-[10px] font-bold border border-red-200" title={rejectReason}><XCircle size={10} /> Rejected</span>;
            return <span className="inline-flex items-center gap-1 text-slate-500 bg-slate-100 px-2 py-0.5 rounded text-[10px] font-bold border border-slate-200">Draft</span>;
        }

        function HistoryList({ records, onDelete, onEdit, allRecords, loggedInUser, selectedMonth, timeFilterType, onBatchUpdate, isBatchUpdating }) {
            const [showConfirmModal, setShowConfirmModal] = useState(false); 

            const draftRecords = records.filter(r => !r.status || r.status === 'draft' || r.status === 'rejected');
            const canSubmit = timeFilterType === 'month' && selectedMonth && draftRecords.length > 0 && loggedInUser.role !== 'admin' && loggedInUser.role !== 'approver2';

            const missingImagesCount = draftRecords.filter(r => !r.beforeImage || !r.afterImage).length;

            const handleSubmitOT = () => {
                if (missingImagesCount > 0) {
                    alert("Submission Locked: Please upload all required images (BEFORE and AFTER) before submitting.");
                    return;
                }
                setShowConfirmModal(true); 
            };

            const executeSubmitOT = async () => {
                setShowConfirmModal(false);
                const newStatus = loggedInUser.role === 'approver1' ? 'pending_2' : 'pending_1';
                await onBatchUpdate(draftRecords, newStatus);
                
                try {
                    let targetEmail = '';
                    let approverName = '';
                    
                    if (newStatus === 'pending_1') {
                        const approver = Object.values(APP_USERS).find(u => u.role === 'approver1' && u.approveTeam === loggedInUser.team);
                        targetEmail = approver?.email;
                        approverName = approver?.displayName;
                    } else if (newStatus === 'pending_2') {
                        const approver = Object.values(APP_USERS).find(u => u.role === 'approver2');
                        targetEmail = approver?.email;
                        approverName = approver?.displayName;
                    }

                    if (targetEmail) {
                        const monthLabel = formatMonth(selectedMonth);
                        const subject = `OT Approval Request for ${monthLabel} by ${loggedInUser.displayName}`;
                        
                        const jobDetails = draftRecords.map((r, i) => `${i+1}. ${r.date} - ${r.location} - ${r.jobType.split('(')[0].trim()}`).join('\n');
                        
                        const body = `Dear ${approverName || 'Manager'},\n\nA new Overtime (OT) approval request has been submitted for ${monthLabel} by ${loggedInUser.displayName}.\n\nJob Details:\n${jobDetails}\n\nPlease review and approve the request via the OT Tracker System.\nLink = https://sambitao.github.io/OT-System/\n\n(This is an automated message from the OT Tracker System.)`;

                        fetch(GAS_WEBHOOK_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: 'send_email', to: targetEmail, subject: subject, body: body }),
                            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                        }).catch(err => console.log("Alert: Could not send email in local mode", err));
                    }
                } catch (e) {
                    console.error("Email notification error:", e);
                }
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                <div className="flex flex-col sm:flex-row gap-4 justify-between items-start sm:items-center mb-2">
                    <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2"><History size={20} className="text-orange-500"/> OT History</h3>
                    <div className="relative w-full sm:w-64">
                        <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                        <input 
                            type="text" 
                            placeholder="Search jobs or locations..." 
                            className="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-all font-medium shadow-sm"
                        />
                    </div>
                </div>

                <div className="overflow-hidden bg-white border border-slate-200 rounded-2xl shadow-sm">
                    <div className="overflow-x-auto">
                    <table className="w-full text-left text-sm">
                        <thead className="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-[10px] font-black tracking-widest">
                        <tr>
                            <th className="px-6 py-4">Job Info & Status</th>
                            <th className="px-6 py-4">Date & Time</th>
                            <th className="px-6 py-4">Responsible</th>
                            <th className="px-6 py-4 text-center">Images</th>
                            <th className="px-6 py-4 text-right">Action</th>
                        </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                        {records.map((record) => {
                            const hasBothImages = record.beforeImage && record.afterImage;
                            const hasOneImage = record.beforeImage || record.afterImage;

                            let displayResponsible = record.responsible;
                            if (allRecords && record.interruptionId && record.interruptionId !== '-') {
                                const coworkers = allRecords
                                    .filter(r => r.interruptionId === record.interruptionId)
                                    .map(r => r.responsible);
                                if (coworkers.length > 0) {
                                    displayResponsible = [...new Set(coworkers)].join(', ');
                                }
                            }

                            // 🌟 แยกสิทธิ์การแก้ไข (Edit) และ การลบ (Delete) ให้ยืดหยุ่นขึ้น
                            const isDraftOrRejected = !record.status || record.status === 'draft' || record.status === 'rejected';
                            const isCompleted = record.status === 'completed'; // เพิ่มเช็คสถานะ Approved
                            const isSelf = isUserMatch(record.responsible, loggedInUser);
                            const isAdmin = loggedInUser.role === 'admin';
                            
                            // ลบได้เฉพาะตอนเป็นร่าง, ตีกลับ หรือเป็น Admin
                            const canDelete = isAdmin || (isSelf && isDraftOrRejected);
                            // 🌟 แก้ไขได้ในตอนที่เป็นร่าง, ตีกลับ หรือ "อนุมัติแล้ว (Completed)" ก็แก้ได้
                            const canEditAction = isAdmin || (isSelf && (isDraftOrRejected || isCompleted));

                            return (
                            <tr key={record.id} className="hover:bg-orange-50/50 transition-colors">
                                <td className="px-6 py-4">
                                <div className="font-bold text-slate-800 break-words whitespace-pre-wrap">{record.interruption}</div>
                                <div className="text-[10px] text-slate-500 flex items-center gap-2 mt-1.5 flex-wrap">
                                    <StatusBadge status={record.status} rejectReason={record.rejectReason} responsibleName={record.responsible} />
                                    <span className="px-1.5 py-0.5 bg-slate-100 border border-slate-200 rounded uppercase font-bold text-slate-600">{record.jobType?.split('(')[1]?.replace(')', '') || record.jobType}</span>
                                    <span className="font-medium">ID: {record.interruptionId || '-'}</span>
                                </div>
                                {record.status === 'rejected' && record.rejectReason && (
                                    <div className="mt-2 text-[10px] text-red-600 font-medium bg-red-50 p-1.5 rounded border border-red-100 flex gap-1">
                                        <MessageSquare size={12} className="shrink-0" />
                                        <span>Reason: {record.rejectReason}</span>
                                    </div>
                                )}
                                </td>
                                <td className="px-6 py-4">
                                <div className="text-slate-700 font-bold">{record.date}</div>
                                <div className="text-xs text-slate-400 font-medium">{record.time}</div>
                                </td>
                                <td className="px-6 py-4">
                                <div className="flex items-start gap-2">
                                    <Users size={14} className="text-slate-400 mt-0.5 shrink-0" />
                                    <span className="text-slate-600 font-medium break-words">{displayResponsible}</span>
                                </div>
                                </td>
                                <td className="px-6 py-4 text-center">
                                {hasBothImages ? (
                                    <span className="inline-flex items-center gap-1 text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-full text-[10px] font-bold border border-emerald-100">
                                    <CheckCircle2 size={10} /> Completed
                                    </span>
                                ) : hasOneImage ? (
                                    <span className="inline-flex items-center gap-1 text-orange-600 bg-orange-50 px-2.5 py-1 rounded-full text-[10px] font-bold border border-orange-100">
                                    <ImageIcon size={10} /> Missing 1 Image
                                    </span>
                                ) : (
                                    <span className="inline-flex items-center gap-1 text-red-600 bg-red-50 px-2.5 py-1 rounded-full text-[10px] font-bold border border-red-100">
                                    <ImageIcon size={10} /> No Images
                                    </span>
                                )}
                                </td>
                                <td className="px-6 py-4 text-right">
                                <div className="flex justify-end gap-3">
                                    {canEditAction && (
                                        <button onClick={() => onEdit(record)} className="text-slate-400 hover:text-orange-500 transition-colors" title="Edit Data / Upload Image"><Edit size={18} /></button>
                                    )}
                                    {canDelete && (
                                        <button onClick={() => onDelete(record.id)} className="text-slate-400 hover:text-red-500 transition-colors" title="Delete Data"><Trash2 size={18} /></button>
                                    )}
                                    {!canEditAction && !canDelete && (
                                        <div className="text-[10px] text-slate-400 font-bold flex items-center gap-1 justify-end"><Lock size={12}/> Locked</div>
                                    )}
                                </div>
                                </td>
                            </tr>
                            );
                        })}
                        {records.length === 0 && (
                            <tr>
                            <td colSpan="5" className="px-6 py-12 text-center text-slate-400 italic font-medium">
                                No records found matching your filters.
                            </td>
                            </tr>
                        )}
                        </tbody>
                    </table>
                    </div>
                </div>

                {canSubmit && (
                    <div className="bg-blue-50 border border-blue-200 rounded-2xl p-6 flex flex-col sm:flex-row items-center justify-between gap-4 shadow-sm animate-in fade-in zoom-in-95">
                        <div className="flex items-start gap-3 text-blue-800">
                            <Send size={24} className="mt-1" />
                            <div>
                                <h4 className="font-bold text-lg">Ready to Submit</h4>
                                <p className="text-sm opacity-80 font-medium">{draftRecords.length} records for {formatMonth(selectedMonth)} ready for manager approval.</p>
                                {missingImagesCount > 0 && (
                                    <p className="text-xs text-red-600 font-bold mt-2 flex items-center gap-1.5 bg-red-50/80 px-2.5 py-1.5 rounded-lg border border-red-200 w-fit">
                                        <XCircle size={14} /> Locked: {missingImagesCount} records are missing images.
                                    </p>
                                )}
                            </div>
                        </div>
                        <button 
                            onClick={handleSubmitOT}
                            disabled={isBatchUpdating || missingImagesCount > 0}
                            className={`w-full sm:w-auto px-8 py-3.5 text-white font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 ${isBatchUpdating || missingImagesCount > 0 ? 'bg-slate-400 shadow-none cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 shadow-blue-600/30'}`}
                        >
                            {isBatchUpdating ? <Loader2 size={18} className="animate-spin" /> : <Send size={18} />}
                            Submit for Approval
                        </button>
                    </div>
                )}

                {showConfirmModal && (
                    <div className="fixed inset-0 z-[70] flex items-center justify-center p-4">
                        <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setShowConfirmModal(false)}></div>
                        <div className="relative bg-white w-full max-w-sm rounded-3xl shadow-2xl p-8 text-center border border-slate-200 animate-in zoom-in-95 duration-200">
                            <div className="w-20 h-20 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-5 border-[6px] border-white shadow-sm">
                                <Send size={36} />
                            </div>
                            <h3 className="text-xl font-black text-slate-800 mb-2">Confirm Submission?</h3>
                            <p className="text-sm text-slate-500 mb-8 font-medium px-4">
                                {formatMonth(selectedMonth)} ({draftRecords.length} records)<br/><br/>Once submitted, records cannot be edited unless rejected.
                            </p>
                            <div className="flex gap-3">
                                <button onClick={() => setShowConfirmModal(false)} className="flex-1 px-4 py-3.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors">Cancel</button>
                                <button onClick={executeSubmitOT} disabled={isBatchUpdating} className="flex-1 px-4 py-3.5 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 shadow-lg shadow-blue-600/30 transition-all flex justify-center items-center gap-2 disabled:opacity-50">
                                    {isBatchUpdating ? <Loader2 size={18} className="animate-spin" /> : <><Send size={18} /> Confirm Submit</>}
                                </button>
                            </div>
                        </div>
                    </div>
                )}
                </div>
            );
        }

        function ApprovalDashboard({ allRecords, loggedInUser, onBatchUpdate, isBatchUpdating, getRecordDateObj, getSortValue, getTeamFromResponsible }) {
            const [rejectModalGroup, setRejectModalGroup] = useState(null);
            const [rejectReasonText, setRejectReasonText] = useState('');
            const [rejectError, setRejectError] = useState(''); 
            const [viewingGroup, setViewingGroup] = useState(null); 
            const [confirmApproveGroup, setConfirmApproveGroup] = useState(null); 

            const getPendingGroups = () => {
                const groups = {};
                
                allRecords.forEach(r => {
                    let shouldSee = false;
                    
                    if (loggedInUser.role === 'admin') {
                        shouldSee = r.status === 'pending_1' || r.status === 'pending_2';
                    } else if (loggedInUser.role === 'approver2') {
                        shouldSee = r.status === 'pending_2';
                    } else if (loggedInUser.role === 'approver1') {
                        const recordTeam = getTeamFromResponsible(r.responsible);
                        const isSelf = isUserMatch(r.responsible, loggedInUser);
                        if (recordTeam === loggedInUser.approveTeam && r.status === 'pending_1' && !isSelf) {
                            shouldSee = true;
                        }
                    }

                    if (shouldSee) {
                        const d = getRecordDateObj(r.date, r.createdAt);
                        const monthKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                        
                        let standardizedName = r.responsible;
                        const matchedUsers = [];
                        for (const key in APP_USERS) {
                            const u = APP_USERS[key];
                            if (u.role !== 'admin' && u.role !== 'approver2' && isUserMatch(r.responsible, u)) {
                                matchedUsers.push(u.displayName);
                            }
                        }

                        if (matchedUsers.length > 0) {
                            standardizedName = matchedUsers.sort().join(', ');
                        }

                        const key = `${standardizedName}_${monthKey}`;
                        
                        if (!groups[key]) {
                            groups[key] = {
                                responsible: standardizedName, 
                                month: monthKey,
                                status: r.status,
                                records: [],
                                totalCost: 0
                            };
                        }
                        
                        groups[key].records.push(r);
                        
                        if (r.jobType?.includes('Short')) groups[key].totalCost += 440;
                        else if (r.jobType?.includes('Medium')) groups[key].totalCost += 660;
                        else if (r.jobType?.includes('Long')) groups[key].totalCost += 880;
                        else if (r.jobType?.includes('Survey')) groups[key].totalCost += 330;
                        else if (r.jobType?.includes('Corrective')) groups[key].totalCost += 440;
                        else if (r.jobType?.includes('Preventive')) groups[key].totalCost += 440;
                    }
                });

                return Object.values(groups).sort((a, b) => b.month.localeCompare(a.month));
            };

            const groups = getPendingGroups();

            const handleApprove = (group) => {
                setConfirmApproveGroup(group); 
            };

            const executeApprove = () => {
                if (!confirmApproveGroup) return;
                const newStatus = 'completed';
                onBatchUpdate(confirmApproveGroup.records, newStatus);
                setViewingGroup(null);
                setConfirmApproveGroup(null);
            };

            const confirmReject = (e) => {
                e.preventDefault();
                setRejectError('');
                if (!rejectReasonText.trim()) {
                    setRejectError('Reason for rejection is required');
                    return;
                }
                onBatchUpdate(rejectModalGroup.records, 'rejected', rejectReasonText);
                setRejectModalGroup(null);
                setRejectReasonText('');
                setViewingGroup(null); 
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                        <div className="flex items-center gap-3 mb-2">
                            <FolderOpen size={24} className="text-orange-500" />
                            <h3 className="font-bold text-slate-800 text-lg">Pending Approvals</h3>
                        </div>
                        <p className="text-sm text-slate-500 font-medium">Please review the details and images before approving. Reject if modifications are needed.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {groups.map((g, idx) => (
                            <div key={idx} className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm hover:shadow-md hover:border-orange-200 transition-all flex flex-col justify-between">
                                <div>
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center font-bold text-lg">
                                                {g.responsible.charAt(0).toUpperCase()}
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-slate-800 leading-tight">{g.responsible}</h4>
                                                <div className="text-[10px] text-slate-400 font-medium uppercase tracking-wider">{getTeamFromResponsible(g.responsible)} Team</div>
                                            </div>
                                        </div>
                                        <StatusBadge status={g.status} responsibleName={g.responsible} />
                                    </div>
                                    
                                    <div className="bg-slate-50 rounded-xl p-3 mb-5 border border-slate-100 flex items-center justify-between">
                                        <div>
                                            <div className="text-[10px] font-bold text-slate-500 uppercase">Month</div>
                                            <div className="font-bold text-slate-800">{formatMonth(g.month)}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] font-bold text-slate-500 uppercase">Total Jobs / Cost</div>
                                            <div className="font-bold text-orange-600">{g.records.length} Jobs | ฿{g.totalCost.toLocaleString()}</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="mt-auto">
                                    <button 
                                        onClick={() => setViewingGroup(g)}
                                        className="w-full py-2 mb-2 bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold rounded-xl transition-colors border border-blue-100 flex items-center justify-center gap-1.5 text-sm"
                                    >
                                        <Search size={16} /> View Details ({g.records.length} items)
                                    </button>
                                    <div className="flex gap-2">
                                        <button 
                                            onClick={() => setRejectModalGroup(g)}
                                            disabled={isBatchUpdating}
                                            className="flex-1 py-2.5 bg-red-50 hover:bg-red-100 text-red-600 font-bold rounded-xl transition-colors border border-red-100 flex items-center justify-center gap-1.5 text-sm disabled:opacity-50"
                                        >
                                            <XCircle size={16} /> Reject
                                        </button>
                                        <button 
                                            onClick={() => handleApprove(g)}
                                            disabled={isBatchUpdating}
                                            className="flex-1 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl transition-colors shadow-md shadow-emerald-500/20 flex items-center justify-center gap-1.5 text-sm disabled:opacity-50"
                                        >
                                            <CheckSquare size={16} /> Approve
                                        </button>
                                    </div>
                                </div>
                            </div>
                        ))}

                        {groups.length === 0 && (

        function Reports({ records, getSortValue, selectedMonth, selectedWeek, timeFilterType, allRecords, loggedInUser }) {
            const [showPreview, setShowPreview] = useState(false);
            const [isExportingExcel, setIsExportingExcel] = useState(false);
            const [exportProgress, setExportProgress] = useState('');

            const handleExportExcel = async () => {
                setIsExportingExcel(true);
                setExportProgress('Preparing export...');
                try {
                    const workbook = new window.ExcelJS.Workbook();
                    const worksheet = workbook.addWorksheet('OT Report');
                    
                    worksheet.columns = [
                        { width: 5 },
                        { width: 20 },
                        { width: 45 },
                        { width: 25 },
                        { width: 25 }
                    ];

                    worksheet.mergeCells('A1:E1');
                    const titleCell = worksheet.getCell('A1');
                    
                    let reportTitleLabel = 'Overtime (OT) Record Details';
                    if (timeFilterType === 'month' && selectedMonth) reportTitleLabel += ` - ${formatMonth(selectedMonth)}`;
                    else if (timeFilterType === 'week') {
                        if (selectedWeek) reportTitleLabel += ` (Week of ${formatWeekLabel(selectedWeek)})`;
                        else if (selectedMonth) reportTitleLabel += ` - ${formatMonth(selectedMonth)}`;
                        else reportTitleLabel += ` (Weekly)`;
                    }
                    else if (timeFilterType === 'year') reportTitleLabel += ` (Current Year)`;
                    
                    titleCell.value = reportTitleLabel;
                    titleCell.font = { name: 'Tahoma', size: 14, bold: true };
                    titleCell.alignment = { vertical: 'middle', horizontal: 'left' };
                    
                    // 🌟 แก้ไข: ฟังก์ชันสำหรับเตรียม Base64 สำหรับ Excel
                    const fetchImageBase64 = async (urlOrBase64) => {
                        if (!urlOrBase64) return null;
                        
                        // 1. ถ้าข้อมูลเป็น Base64 ที่ฝังมาอยู่แล้ว (แบบใหม่) ให้ใช้ได้เลย
                        if (urlOrBase64.startsWith('data:image')) {
                            return urlOrBase64; 
                        }
                        
                        // 2. ถ้าเป็น URL ของ Google Drive (แบบเก่า) ให้ยิงไปดึงจาก GAS เหมือนเดิม
                        try {
                            const urlObj = new URL(urlOrBase64);
                            const fileId = urlObj.searchParams.get('id') || urlOrBase64.split('/d/')[1]?.split('/')[0];
                            
                            if (!fileId) return null;

                            const response = await fetch(GAS_WEBHOOK_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: 'get_image', fileId: fileId }),
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                            });
                            const result = await response.json();
                            if (result.success) return result.base64;
                        } catch (e) {
                            console.error("Image proxy failed", e);
                        }
                        return null;
                    };

                    const allCompleted = records.length > 0 && records.every(r => r.status === 'completed');
                    let currentRow = 2;
                    
                    if (allCompleted) {
                        const approvedRecords = [...records].filter(r => r.approveDate).sort((a, b) => new Date(b.approveDate).getTime() - new Date(a.approveDate).getTime());
                        const approverName = approvedRecords.length > 0 ? approvedRecords[0].approvedBy : '-';
                        const approveDateRaw = approvedRecords.length > 0 ? approvedRecords[0].approveDate : null;
                        const approveDate = approveDateRaw ? new Date(approveDateRaw).toLocaleString('en-US') : '-';
                        
                        worksheet.addRow([`Status: Approved | Approved by: ${approverName} | Date: ${approveDate}`]);
                        worksheet.mergeCells('A2:E2');
                        worksheet.getCell('A2').font = { name: 'Tahoma', size: 11, bold: true, color: { argb: 'FF059669' } };
                        worksheet.getCell('A2').alignment = { vertical: 'middle', horizontal: 'left' };
                        currentRow = 3;
                    }

                    const sortedRecords = [...records].sort((a, b) => getSortValue(a.date, a.createdAt) - getSortValue(b.date, b.createdAt)); 
                    
                    for (let index = 0; index < sortedRecords.length; index++) {
                        const record = sortedRecords[index];
                        setExportProgress(`Fetching image ${index + 1}/${sortedRecords.length}...`);
                        const i = index + 1;
                        
                        let displayResponsible = record.responsible;
                        if (allRecords && record.interruptionId && record.interruptionId !== '-') {
                            const coworkers = allRecords
                                .filter(r => r.interruptionId === record.interruptionId)
                                .map(r => r.responsible);
                            if (coworkers.length > 0) {
                                displayResponsible = [...new Set(coworkers)].join(', ');
                            }
                        }
                        
                        worksheet.addRow([i, 'JOB Type :', record.jobType, 'Before Image', 'After Image']);
                        worksheet.addRow(['', 'Interruption :', record.interruption, '', '']);
                        worksheet.addRow(['', 'Interruption ID :', record.interruptionId || '-', '', '']);
                        worksheet.addRow(['', 'Reason :', record.reason || '-', '', '']);
                        worksheet.addRow(['', 'Location :', record.location, '', '']);
                        worksheet.addRow(['', 'Date :', record.date, '', '']);
                        worksheet.addRow(['', 'Time :', record.time, '', '']);
                        worksheet.addRow(['', 'Responsible Staff :', displayResponsible, '', '']);
                        
                        worksheet.mergeCells(`A${currentRow}:A${currentRow+7}`);
                        worksheet.mergeCells(`D${currentRow+1}:D${currentRow+7}`);
                        worksheet.mergeCells(`E${currentRow+1}:E${currentRow+7}`);
                        
                        for (let r = currentRow; r <= currentRow + 7; r++) {
                            const row = worksheet.getRow(r);
                            row.height = 18; 
                            row.eachCell({ includeEmpty: true }, (cell) => {
                                cell.font = { name: 'Tahoma', size: 10 };
                                cell.border = {
                                    top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'}
                                };
                                cell.alignment = { vertical: 'top', wrapText: true };
                            });
                        }
                        
                        worksheet.getCell(`A${currentRow}`).alignment = { vertical: 'middle', horizontal: 'center' };
                        worksheet.getCell(`A${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`B${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`C${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true, color: { argb: 'FFEA580C' } }; 
                        worksheet.getCell(`D${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`D${currentRow}`).alignment = { horizontal: 'center' };
                        worksheet.getCell(`E${currentRow}`).font = { name: 'Tahoma', size: 10, bold: true };
                        worksheet.getCell(`E${currentRow}`).alignment = { horizontal: 'center' };
                        
                        const addImageToCell = async (imageUrl, colIndex0Based, currentR) => {
                            const base64String = await fetchImageBase64(imageUrl);
                            if (!base64String) return;
                            
                            const extMatch = base64String.match(/^data:image\/([a-zA-Z0-9]+);base64,/);
                            const ext = extMatch ? extMatch[1] : 'png';
                            const base64Data = base64String.replace(/^data:image\/[a-zA-Z0-9]+;base64,/, '');
                            const imgId = workbook.addImage({ base64: base64Data, extension: ext });
                            
                            worksheet.addImage(imgId, {
                                tl: { col: colIndex0Based, row: currentR }, 
                                br: { col: colIndex0Based + 1, row: currentR + 7 }, 
                                editAs: 'twoCell'
                            });
                        };

                        if (record.beforeImage) await addImageToCell(record.beforeImage, 3, currentRow);
                        if (record.afterImage) await addImageToCell(record.afterImage, 4, currentRow);
                        
                        currentRow += 8;
                        worksheet.addRow([]); 
                        currentRow += 1;
                    }
                    
                    setExportProgress('Generating Excel...');
                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const link = document.createElement("a");
                    const url = URL.createObjectURL(blob);
                    link.setAttribute("href", url);
                    link.setAttribute("download", `OT_Report_${selectedMonth || 'All_Time'}_${new Date().getTime()}.xlsx`);
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                } catch (error) {
                    console.error("Excel generation error:", error);
                    alert('An error occurred while generating Excel file.');
                } finally {
                    setIsExportingExcel(false);
                    setExportProgress('');
                }
            };

            return (
                <div className="space-y-6 animate-in fade-in duration-500">
                <div className="bg-white rounded-2xl border border-slate-200 p-8 text-center space-y-6 shadow-sm">
                    <div className="w-16 h-16 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mx-auto">
                    <TableProperties size={32} />
                    </div>
                    <div className="space-y-2">
                        <h3 className="text-xl font-bold text-slate-800">Export Center</h3>
                        <p className="text-slate-500 max-w-sm mx-auto text-sm font-medium">
                        Generate tabular reports based on your selected filters above.
                        </p>
                    </div>

                    <div className="flex flex-col sm:flex-row gap-3 justify-center pt-6">
                    <button 
                        onClick={() => setShowPreview(true)}
                        className="flex items-center justify-center gap-2 px-6 py-3 bg-white border border-slate-200 text-slate-700 rounded-xl font-bold hover:bg-orange-50 hover:text-orange-600 hover:border-orange-200 transition-all shadow-sm"
                    >
                        <Eye size={20} /> Preview & Download
                    </button>
                    </div>
                    
                    {records.length === 0 && (
                        <p className="text-xs text-orange-500 font-bold mt-4">! No records found. Try adjusting the filters.</p>
                    )}
                </div>

                {showPreview && (
                    <ReportPreviewModal 
                        records={records} 
                        getSortValue={getSortValue}
                        onClose={() => setShowPreview(false)} 
                        onExportExcel={handleExportExcel}
                        isExportingExcel={isExportingExcel} 
                        exportProgress={exportProgress}
                        selectedMonth={selectedMonth}
                        selectedWeek={selectedWeek}
                        timeFilterType={timeFilterType}
                        allRecords={allRecords}
                        loggedInUser={loggedInUser}
                    />
                )}
                </div>
            );
        }

        function ReportPreviewModal({ records, getSortValue, onClose, onExportExcel, isExportingExcel, exportProgress, selectedMonth, selectedWeek, timeFilterType, allRecords, loggedInUser }) {
            const [isPrinting, setIsPrinting] = useState(false);

            const allCompleted = records.length > 0 && records.every(r => r.status === 'completed');
            // 🌟 ให้สิทธิ์ Manager (Approver 1, Approver 2, Admin) Export เอกสารได้เสมอ
            const canExport = allCompleted || loggedInUser.role === 'admin' || loggedInUser.role === 'approver1' || loggedInUser.role === 'approver2';
            
            const approvedRecords = [...records].filter(r => r.approveDate).sort((a, b) => new Date(b.approveDate).getTime() - new Date(a.approveDate).getTime());
            const approverName = approvedRecords.length > 0 ? approvedRecords[0].approvedBy : '-';
            const approveDateRaw = approvedRecords.length > 0 ? approvedRecords[0].approveDate : null;
            const approveDate = approveDateRaw ? new Date(approveDateRaw).toLocaleString('en-US') : '-';

            const handlePrint = () => {
                setIsPrinting(true);
                const printContent = document.getElementById('report-print-area').innerHTML;
                
                const iframe = document.createElement('iframe');
                iframe.style.visibility = 'hidden';
                iframe.style.position = 'absolute';
                iframe.style.width = '0px';
                iframe.style.height = '0px';
                iframe.style.border = 'none';
                document.body.appendChild(iframe);
                
                const docWindow = iframe.contentWindow.document;
                docWindow.open();
                
                docWindow.write(`
                    <!DOCTYPE html>
                    <html>
                        <head>
                            <title>OT_Report_${new Date().toLocaleDateString('en-GB').replace(/\//g, '-')}</title>
                            <script src="https://cdn.tailwindcss.com"><\/script>
                            <style>
                                @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
                                body { font-family: 'Tahoma', 'Sarabun', sans-serif; line-height: 1.5; color: #1e293b; background: white; }
                                @media print {
                                    @page { size: A4 portrait; margin: 10mm; }
                                    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
                                    tbody { page-break-inside: avoid !important; }
                                }
                            </style>
                        </head>
                        <body>
                            <div style="width: 100%; max-width: 210mm; margin: 0 auto; padding: 0;">
                                ${printContent}
                            </div>
                            <script>
                                window.onload = function() {
                                    setTimeout(function() {
                                        window.focus();
                                        window.print();
                                    }, 800);
                                };
                            <\/script>
                        </body>
                    </html>
                `);
                docWindow.close();
                setTimeout(() => { setIsPrinting(false); }, 1500);
                setTimeout(() => { if (document.body.contains(iframe)) document.body.removeChild(iframe); }, 300000); 
            };

            const sortedRecords = [...records].sort((a, b) => getSortValue(a.date, a.createdAt) - getSortValue(b.date, b.createdAt));

            return (

                    </div>
                </div>

                    <div className="p-4 border-t border-slate-100 flex flex-col bg-white">
                        {!canExport && (
                            <div className="w-full text-center text-xs text-red-500 font-bold mb-3 p-2 bg-red-50 rounded-lg border border-red-100 flex items-center justify-center gap-1">
                                <XCircle size={14} /> Cannot export: Some records are still in Draft or Pending status (Manager bypass allowed).

                        )}
                        <div className="flex flex-wrap justify-end gap-3">
                            <button 
                                onClick={onClose}

                                Close
                            </button>
                            <button 
                                onClick={onExportExcel}
                                disabled={records.length === 0 || isExportingExcel || isPrinting || !canExport}
                                className={`flex items-center gap-2 px-6 py-2.5 text-white font-bold rounded-xl transition-all shadow-lg ${!canExport || records.length === 0 ? 'bg-slate-300 shadow-none cursor-not-allowed' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-100'}`}
                            >

                            </button>
                            <button

                                disabled={records.length === 0 || isExportingExcel || isPrinting || !canExport}
                                className={`flex items-center gap-2 px-6 py-2.5 text-white font-bold rounded-xl transition-all shadow-lg ${!canExport || records.length === 0 ? 'bg-slate-300 shadow-none cursor-not-allowed' : 'bg-orange-500 hover:bg-orange-600 shadow-orange-500/30'}`}
                            >
                                {isPrinting ? <Loader2 size={18} className="animate-spin" /> : <Printer size={18} />}
                                Print / Save as PDF
                            </button>
